<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>系统架构图 — Unity3D + LLM 多智能体仿真</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0d1117;
  --card:   #161b22;
  --border: #21262d;
  --blue:   #58a6ff;
  --green:  #3fb950;
  --orange: #d29922;
  --red:    #f85149;
  --purple: #bc8cff;
  --text:   #c9d1d9;
  --muted:  #8b949e;
  --font:   'SF Mono', 'Consolas', 'Liberation Mono', monospace;
}
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; }

/* ── Toolbar ──────────────────────────────────────────────────────────────── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 40px;
  background: var(--card); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px; padding: 0 12px; z-index: 200;
}
#toolbar h1 { font-size: 13px; color: var(--blue); margin-right: 4px; white-space: nowrap; }
.tb-btn {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 10px; font-family: var(--font); font-size: 11px;
  cursor: pointer; transition: border-color .15s, color .15s;
}
.tb-btn:hover { border-color: var(--blue); color: var(--blue); }
.tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
#tb-scale { font-size: 11px; color: var(--muted); min-width: 38px; text-align: center; }
#tb-hint { font-size: 10px; color: var(--muted); margin-left: auto; white-space: nowrap; }

/* ── Viewport ─────────────────────────────────────────────────────────────── */
#viewport {
  position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
  overflow: hidden; cursor: default;
}
#viewport.panning { cursor: grabbing; }

/* ── Diagram canvas ───────────────────────────────────────────────────────── */
#diagram {
  position: absolute; width: 1860px; height: 1160px;
  transform-origin: 0 0;
}

/* ── Layer background bands ───────────────────────────────────────────────── */
.layer-bg {
  position: absolute; left: 6px; width: 958px;
  border-radius: 7px; border: 1px solid rgba(255,255,255,0.07);
  pointer-events: none;
}
.layer-title {
  position: absolute; left: 10px; top: 7px;
  font-size: 10px; font-weight: bold; color: rgba(255,255,255,0.55);
  background: rgba(0,0,0,0.35); padding: 2px 9px; border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.12); cursor: pointer;
  pointer-events: all; user-select: none; white-space: nowrap;
}
.layer-title:hover { color: #fff; }

/* ── SVG arrow overlay ────────────────────────────────────────────────────── */
#arrows {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: visible;
}

/* ── Nodes ────────────────────────────────────────────────────────────────── */
.node {
  position: absolute; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 8px; cursor: move; user-select: none;
  transition: box-shadow .12s, border-color .12s; z-index: 10;
}
.node:hover  { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(88,166,255,.2); z-index: 30; }
.node.hl     { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(88,166,255,.25); z-index: 30; }
.node.dashed { border-style: dashed; border-color: #4b5563; opacity: .82; }
.node.llm    { border-color: #3b82f6; background: #0f1f3d; }
.node.col    {
  border-radius: 8px; padding: 10px 9px;
  display: flex; flex-direction: column; overflow: hidden;
}
.node-label {
  font-size: 11px; font-weight: bold; color: var(--text);
  white-space: nowrap; outline: none; cursor: text;
}
.node.col .node-label {
  white-space: normal; text-align: center; border-bottom: 1px solid var(--border);
  padding-bottom: 6px; margin-bottom: 5px; font-size: 10px; cursor: text;
}
.node-sub {
  font-size: 9px; color: var(--muted); margin-top: 2px;
  outline: none; white-space: pre; cursor: text; line-height: 1.55;
}
.node.col .node-sub { font-size: 9.5px; white-space: pre; flex: 1; overflow: auto; }

/* ── Legend ───────────────────────────────────────────────────────────────── */
#legend {
  position: fixed; top: 50px; right: 12px;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 13px; z-index: 300; font-size: 10px; min-width: 158px;
}
#legend h3 { font-size: 11px; color: var(--blue); margin-bottom: 8px; }
.li { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.ll { width: 28px; height: 0; flex-shrink: 0; }
.ll.solid  { height: 2px; background: #c9d1d9; }
.ll.blue   { border-bottom: 2px dashed #58a6ff; }
.ll.orange { height: 2px; background: #d29922; }
.ll.red    { border-bottom: 2px dashed #f85149; }
.ll.gray   { border-bottom: 2px dashed #6b7280; }
#legend-sep { border-top: 1px solid var(--border); margin: 7px 0 8px; }
.lc { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>

    col:true, layer:-1, dashed:true, x:1692, y:32, w:138, h:1060, bdr:'#374151', bg:'rgba(55,65,81,.10)' },

// ============================================================
//  ARROW DATA
// ============================================================
const ARROWS = [
  // L0
  { f:'user',     t:'dashboard', type:'black' },
  { f:'dashboard',t:'statesrv',  type:'black' },
  // L0→L1
  { f:'statesrv', t:'planning',  type:'black', lbl:'任务指令' },

  // L2

  { f:'select',   t:'llm3',      type:'blue',  lbl:'API Call' },

  // MemoryModule col ↔ adm
  { f:'adm',      t:'memcol',    type:'gray',  lbl:'未实现' },
  { f:'adm',      t:'refcol',    type:'gray',  lbl:'未实现' },

// ============================================================
//  STATE
// ============================================================
const nm = {};
NODES.forEach(n => nm[n.id] = n);

let scale = 0.85, panX = 20, panY = 10;
const diagram = document.getElementById('diagram');
const vp      = document.getElementById('viewport');
const svg     = document.getElementById('arrows');
const scaleLbl= document.getElementById('tb-scale');
const collapsed = new Set();

// ============================================================
//  COORDINATE HELPERS
// ============================================================
const TOOLBAR_H = 40;

function toD(screenX, screenY) {
  return {
    x: (screenX      - panX) / scale,
    y: (screenY - TOOLBAR_H - panY) / scale
  };
}

function applyXform() {
  diagram.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  scaleLbl.textContent = Math.round(scale * 100) + '%';
}

// ============================================================
//  RENDER NODES
// ============================================================
function renderNodes() {
  document.querySelectorAll('.node').forEach(el => el.remove());
  NODES.forEach(n => {
    if (n.layer >= 0 && collapsed.has(n.layer)) return;
    const div = document.createElement('div');
    div.id = 'nd-' + n.id;
    div.className = 'node' + (n.dashed?' dashed':'') + (n.llm?' llm':'') + (n.col?' col':'');
    div.style.cssText = `left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px;`;
    if (n.bdr) div.style.borderColor = n.bdr;
    if (n.bg)  div.style.background  = n.bg;

    const lbl = document.createElement('div');
    lbl.className = 'node-label';
    lbl.contentEditable = 'true';
    lbl.spellcheck = false;
    lbl.textContent = n.label;
    div.appendChild(lbl);

    if (n.sub) {
      const sub = document.createElement('div');
      sub.className = 'node-sub';
      sub.contentEditable = 'true';
      sub.spellcheck = false;
      sub.textContent = n.sub;
      div.appendChild(sub);
    }

    div.addEventListener('mousedown', onNodeMouseDown);
    div.addEventListener('mouseenter', () => hlNode(n.id, true));
    div.addEventListener('mouseleave',  () => hlNode(n.id, false));
    diagram.appendChild(div);
  });
}

// ============================================================
//  ARROW STYLES
// ============================================================
const ASTYLE = {
  black:  { stroke:'#c9d1d9', dash:null,    w:1.5, mk:'mk-black'  },
  blue:   { stroke:'#58a6ff', dash:'6,3',   w:1.5, mk:'mk-blue'   },
  orange: { stroke:'#d29922', dash:null,    w:2,   mk:'mk-orange', mks:'mk-orange-s' },
  gray:   { stroke:'#6b7280', dash:'4,4',   w:1.2, mk:'mk-gray'   },
  red:    { stroke:'#f85149', dash:'6,3',   w:1.5, mk:'mk-red'    },
};

// ============================================================
//  EDGE CALCULATION
// ============================================================
function edge(aid, bid) {
  const a = nm[aid], b = nm[bid];
  if (!a || !b) return null;
  const acy = a.y + a.h / 2, acx = a.x + a.w / 2;
  const bcy = b.y + b.h / 2, bcx = b.x + b.w / 2;
  const dx = bcx - acx, dy = bcy - acy;
  let sx, sy, ex, ey;
  if (Math.abs(dy) >= Math.abs(dx) * 0.6) {
    sx = acx; ex = bcx;
    if (dy >= 0) { sy = a.y + a.h; ey = b.y; }
    else         { sy = a.y;       ey = b.y + b.h; }
  } else {
    sy = acy; ey = bcy;
    if (dx >= 0) { sx = a.x + a.w; ex = b.x; }
    else         { sx = a.x;       ex = b.x + b.w; }
  }
  return { sx, sy, ex, ey };
}

function pathD(sx, sy, ex, ey) {
  const adx = Math.abs(ex - sx), ady = Math.abs(ey - sy);
  if (adx < 5 || ady < 5) return `M${sx} ${sy} L${ex} ${ey}`;
  const c1x = sx + (ex-sx)*0.4, c1y = sy;
  const c2x = sx + (ex-sx)*0.6, c2y = ey;
  return `M${sx} ${sy} C${c1x} ${c1y} ${c2x} ${c2y} ${ex} ${ey}`;
}

// ============================================================
//  RENDER ARROWS
// ============================================================
function renderArrows() {
  svg.querySelectorAll('path,text').forEach(el => el.remove());
  ARROWS.forEach((a, i) => {
    const fn = nm[a.f], tn = nm[a.t];
    if (!fn || !tn) return;
    if (collapsed.has(fn.layer) || collapsed.has(tn.layer)) return;
    const e = edge(a.f, a.t);
    if (!e) return;
    const s = ASTYLE[a.type] || ASTYLE.black;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', pathD(e.sx,e.sy,e.ex,e.ey));
    p.setAttribute('stroke', s.stroke);
    p.setAttribute('stroke-width', s.w);
    p.setAttribute('fill', 'none');
    if (s.dash)  p.setAttribute('stroke-dasharray', s.dash);
    p.setAttribute('marker-end', `url(#${s.mk})`);
    if (a.bidir && s.mks) p.setAttribute('marker-start', `url(#${s.mks})`);
    p.setAttribute('data-i', i);
    svg.appendChild(p);
    if (a.lbl) {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', (e.sx+e.ex)/2);
      t.setAttribute('y', (e.sy+e.ey)/2 - 5);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('fill', s.stroke);
      t.setAttribute('font-size','9');
      t.setAttribute('font-family','SF Mono,Consolas,monospace');
      t.setAttribute('pointer-events','none');
      t.textContent = a.lbl;
      svg.appendChild(t);
    }
  });
}

// ============================================================
//  HOVER HIGHLIGHT
// ============================================================
function hlNode(id, on) {
  const div = document.getElementById('nd-' + id);
  if (div) div.classList.toggle('hl', on);
  if (on) {
    svg.querySelectorAll('path').forEach(p => {
      const i = parseInt(p.getAttribute('data-i'));
      const a = ARROWS[i];
      if (a && (a.f === id || a.t === id)) {
        p.setAttribute('stroke-width', (ASTYLE[a.type]||ASTYLE.black).w * 2.2);
        p.style.opacity = '1';
      } else {
        p.style.opacity = '0.12';
      }
    });
  } else {
    svg.querySelectorAll('path').forEach(p => {
      const i = parseInt(p.getAttribute('data-i'));
      const a = ARROWS[i];
      p.setAttribute('stroke-width', (ASTYLE[a?.type]||ASTYLE.black).w);
      p.style.opacity = '';
    });
  }
}

// ============================================================
//  DRAG NODES
// ============================================================
let drag = null;

function onNodeMouseDown(e) {
  if (e.target.contentEditable === 'true' || e.target.isContentEditable) return;
  if (e.button !== 0) return;
  e.stopPropagation(); e.preventDefault();
  const id = e.currentTarget.id.replace('nd-','');
  const n  = nm[id];
  const d  = toD(e.clientX, e.clientY);
  drag = { n, el: e.currentTarget, ox: d.x - n.x, oy: d.y - n.y };
  e.currentTarget.style.zIndex = 80;
  document.addEventListener('mousemove', onDragMove, {passive:false});
  document.addEventListener('mouseup',   onDragEnd);
}

function onDragMove(e) {
  if (!drag) return;
  e.preventDefault();
  const d = toD(e.clientX, e.clientY);
  drag.n.x = Math.max(0, d.x - drag.ox);
  drag.n.y = Math.max(0, d.y - drag.oy);
  drag.el.style.left = drag.n.x + 'px';
  drag.el.style.top  = drag.n.y + 'px';
  renderArrows();
}

function onDragEnd() {
  if (!drag) return;
  drag.el.style.zIndex = '';
  drag = null;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup',   onDragEnd);
}

// ============================================================
//  PAN & ZOOM
// ============================================================
let panning = false, panStart = null;

vp.addEventListener('mousedown', e => {
  if (e.target !== vp && e.target !== diagram) return;
  if (e.button !== 0) return;
  panning = true; panStart = { x: e.clientX - panX, y: e.clientY - panY };
  vp.classList.add('panning');
});
document.addEventListener('mousemove', e => {
  if (!panning) return;
  panX = e.clientX - panStart.x;
  panY = e.clientY - panStart.y;
  applyXform();
});
document.addEventListener('mouseup', () => { panning = false; vp.classList.remove('panning'); });

vp.addEventListener('wheel', e => {
  e.preventDefault();
  zoom(e.deltaY < 0 ? 0.1 : -0.1);
}, { passive: false });

function zoom(delta) {
  scale = Math.max(0.15, Math.min(3, scale + delta));
  applyXform();
}

// ============================================================
//  TOOLBAR ACTIONS
// ============================================================
const ORIG = {};
NODES.forEach(n => { ORIG[n.id] = { x: n.x, y: n.y }; });

function resetLayout() {
  NODES.forEach(n => { const o = ORIG[n.id]; if (o) { n.x = o.x; n.y = o.y; } });
  scale = 0.85; panX = 20; panY = 10;
  collapsed.clear();
  // Restore layer title chevrons
  document.querySelectorAll('.layer-title').forEach(el => {
    el.textContent = el.textContent.replace('▶','▾');
  });
  applyXform(); renderNodes(); renderArrows();
}

function fitView() {
  const vpW = vp.offsetWidth, vpH = vp.offsetHeight;
  scale = Math.min(vpW / 1860, vpH / 1160) * 0.96;
  panX = (vpW - 1860 * scale) / 2;
  panY = (vpH - 1160 * scale) / 2;
  applyXform();
}

function copySVG() {
  const clone = svg.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('width','1860'); clone.setAttribute('height','1160');
  const txt = new XMLSerializer().serializeToString(clone);
  navigator.clipboard?.writeText(txt).then(() => alert('SVG 已复制到剪贴板'))
    .catch(() => { const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('SVG 已复制'); });
}

// ============================================================
//  COLLAPSE LAYERS
// ============================================================
function toggleLayer(idx) {
  const bg = document.getElementById('lb' + idx);
  const btn = bg?.querySelector('.layer-title');
  if (collapsed.has(idx)) {
    collapsed.delete(idx);
    if (btn) btn.textContent = btn.textContent.replace('▶','▾');
  } else {
    collapsed.add(idx);
    if (btn) btn.textContent = btn.textContent.replace('▾','▶');
  }
  renderNodes(); renderArrows();
}

// ============================================================
//  INIT
// ============================================================
renderNodes();
renderArrows();
applyXform();
</script>
</body>
</html>
