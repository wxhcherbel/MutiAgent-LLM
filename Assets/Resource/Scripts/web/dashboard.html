<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>多智能体仿真仪表板</title>
<style>
/* ── Reset & Base ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --card:    #161b22;
  --border:  #21262d;
  --blue:    #58a6ff;
  --green:   #3fb950;
  --orange:  #d29922;
  --red:     #f85149;
  --purple:  #bc8cff;
  --cyan:    #39d353;
  --text:    #c9d1d9;
  --muted:   #8b949e;
  --font:    'SF Mono', 'Consolas', 'Liberation Mono', monospace;
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  display: flex;
  flex-direction: column;
}

/* ── Header ────────────────────────────────────────────────────────────────── */
#header {
  flex-shrink: 0;
  height: 42px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 14px;
}
#header h1 { font-size: 14px; color: var(--blue); white-space: nowrap; }
.badge {
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  white-space: nowrap;
}
.badge.ok  { border-color: var(--green);  color: var(--green); animation: badgePulse 2s ease-in-out infinite; }
.badge.err { border-color: var(--red);    color: var(--red); }
@keyframes badgePulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
  50%      { box-shadow: 0 0 0 3px rgba(63,185,80,0.25); }
}
#tooltip { transition: border-color 0.15s; }
.hdr-stat  { color: var(--muted); font-size: 11px; }
#hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 2px 5px;
  font-family: var(--font);
  font-size: 11px;
}

/* ── Main layout ───────────────────────────────────────────────────────────── */
#main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

#left-panel {
  flex: 0 0 60%;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#mapCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  cursor: crosshair;
  display: block;
}
#map-overlay {
  position: absolute;
  bottom: 8px; left: 8px;
  font-size: 10px;
  color: var(--muted);
  pointer-events: none;
  background: rgba(13,17,23,0.75);
  padding: 3px 7px;
  border-radius: 3px;
}
#tooltip {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 9px;
  font-size: 11px;
  pointer-events: none;
  display: none;
  z-index: 20;
  max-width: 230px;
  line-height: 1.7;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

/* ── Divider ───────────────────────────────────────────────────────────────── */
#divider {
  width: 5px;
  flex-shrink: 0;
  background: var(--border);
  cursor: col-resize;
  transition: background 0.15s;
  z-index: 5;
}
#divider:hover, #divider.dragging { background: var(--blue); }

/* ── Right panel ───────────────────────────────────────────────────────────── */
#right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  background: var(--bg);
  border-left: 1px solid var(--border);
}

/* ── Tabs ──────────────────────────────────────────────────────────────────── */
#tabs-header {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
.tab-btn {
  padding: 9px 14px;
  font-family: var(--font);
  font-size: 11px;
  color: var(--muted);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

#tab-content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.tab-pane {
  display: none;
  flex: 1;
  overflow-y: auto;
  flex-direction: column;
}
.tab-pane.active { display: flex; }

/* ── Agent cards ───────────────────────────────────────────────────────────── */
#tab-agents { padding: 0; gap: 0; }
.agents-toolbar {
  display: flex;
  gap: 4px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
.agents-body { flex: 1; overflow-y: auto; padding: 8px; }
.view-btn {
  padding: 2px 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--font);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.view-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

.agent-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--muted);
  border-radius: 6px;
  padding: 8px 10px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
  margin-bottom: 6px;
}
.agent-card:hover { border-color: var(--blue); border-left-color: var(--blue); }
.agent-card.selected {
  border-color: var(--blue);
  border-left-color: var(--blue);
  box-shadow: 0 0 0 1px var(--blue);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}
.card-id   { font-size: 12px; font-weight: bold; }
.card-meta { font-size: 10px; color: var(--muted); }
.team-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  color: #fff;
  font-weight: bold;
  margin-left: 4px;
}
.row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin: 2px 0;
  font-size: 11px;
  gap: 4px;
}
.lbl { color: var(--muted); flex-shrink: 0; }
.val { white-space: pre-wrap; word-break: break-word; text-align: left; flex: 1; }

/* ── ctx block ─────────────────────────────────────────────────────────────── */
.ctx-block {
  margin-top: 5px;
  background: rgba(88,166,255,0.05);
  border: 1px solid rgba(88,166,255,0.15);
  border-radius: 4px;
  padding: 5px 7px;
  font-size: 10px;
}
.ctx-block-title {
  color: var(--blue);
  font-size: 10px;
  font-weight: bold;
  margin-bottom: 4px;
}
.ctx-list-item {
  color: var(--text);
  padding: 1px 0 1px 8px;
  border-left: 2px solid var(--border);
  margin: 1px 0;
  font-size: 10px;
  white-space: pre-wrap;
  word-break: break-word;
}
.battery-bar  { height: 4px; background: var(--border); border-radius: 2px; margin: 3px 0; }
.battery-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.expand-btn {
  font-size: 10px;
  color: var(--blue);
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  padding: 2px 0;
  margin-top: 3px;
}
.card-details { display: none; margin-top: 5px; border-top: 1px solid var(--border); padding-top: 5px; }
.card-details.open { display: block; }
.teammate-chip {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  margin: 1px 2px;
  border: 1px solid var(--border);
}

/* ── Team group view ───────────────────────────────────────────────────────── */
.team-group { margin-bottom: 10px; }
.team-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 5px;
  margin-bottom: 6px;
  font-size: 11px;
  font-weight: bold;
}
.team-color-bar { width: 4px; height: 18px; border-radius: 2px; flex-shrink: 0; }
.team-group-cards { padding-left: 8px; }

/* ── Status colors ─────────────────────────────────────────────────────────── */
.s-idle,.s-done     { color: var(--green); }
.s-running,.s-active { color: var(--blue); }
.s-thinking,.s-interpreting,.s-negotiating,.s-replanning,.s-parsing,.s-slotgen,.s-slotpick,.s-stepgen,.s-grouping { color: var(--orange); }
.s-error,.s-failed  { color: var(--red); }
.s-other            { color: var(--muted); }

/* ── Comms tab ─────────────────────────────────────────────────────────────── */
#tab-comms { padding: 0; overflow: hidden; }
#comms-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
.filter-btn {
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--font);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
#comms-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.msg-entry {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.msg-time     { color: var(--muted); width: 40px; flex-shrink: 0; padding-top: 1px; }
.msg-type-tag {
  flex-shrink: 0;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  line-height: 16px;
  white-space: nowrap;
}
.msg-route  { color: var(--muted); flex-shrink: 0; white-space: nowrap; }
.msg-content {
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  cursor: pointer;
  min-width: 0;
}
.msg-content.expanded { white-space: normal; word-break: break-word; }

/* ── LLM logs tab ──────────────────────────────────────────────────────────── */
#tab-llm { padding: 0; overflow: hidden; }
#llm-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
#llm-toolbar label { font-size: 10px; color: var(--muted); }
#llm-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.llm-entry {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 4px;
  font-size: 11px;
  overflow: hidden;
}
.llm-entry-header {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 6px;
  padding: 5px 8px;
  cursor: pointer;
  user-select: none;
}
.llm-entry-header:hover { background: rgba(88,166,255,0.05); }
.llm-type-tag {
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: bold;
  flex-shrink: 0;
}
.llm-agent  { color: var(--blue); flex-shrink: 0; }
.llm-ts     { color: var(--muted); font-size: 10px; flex-shrink: 0; }
.llm-model  { color: var(--muted); font-size: 10px; flex-shrink: 0; }
.llm-preview { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.llm-tag {
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  flex-shrink: 0;
  font-style: italic;
}
.llm-body {
  display: none;
  padding: 6px 8px;
  border-top: 1px solid var(--border);
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
  font-size: 10px;
  max-height: 300px;
  overflow-y: auto;
  background: var(--bg);
}
.llm-body.open { display: block; }

/* ── Control tab ───────────────────────────────────────────────────────────── */
#tab-control { padding: 10px; gap: 12px; }
.ctrl-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  flex-shrink: 0;
}
.ctrl-title { font-size: 11px; color: var(--blue); margin-bottom: 8px; font-weight: bold; }
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ctrl-label { font-size: 10px; color: var(--muted); width: 70px; flex-shrink: 0; }
.ctrl-input {
  flex: 1;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 4px 7px;
  font-family: var(--font);
  font-size: 11px;
}
.ctrl-input:focus { outline: none; border-color: var(--blue); }
textarea.ctrl-input { resize: vertical; min-height: 60px; }
.ctrl-btn {
  padding: 4px 12px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 3px;
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.ctrl-btn:hover { opacity: 0.85; }
.ctrl-btn.secondary {
  background: var(--border);
  color: var(--text);
}
.preset-btns { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.preset-btn {
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: transparent;
  color: var(--muted);
  font-family: var(--font);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.preset-btn:hover { border-color: var(--blue); color: var(--blue); }
.ctrl-status {
  font-size: 10px;
  padding: 3px 0;
  min-height: 18px;
}
.ctrl-status.ok  { color: var(--green); }
.ctrl-status.err { color: var(--red); }
.num-input {
  width: 60px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 4px 7px;
  font-family: var(--font);
  font-size: 11px;
}

/* ── Debug tab ─────────────────────────────────────────────────────────────── */
#tab-debug { padding: 8px; gap: 8px; overflow-y: auto; }
.debug-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  flex-shrink: 0;
}
.debug-title { font-size: 11px; color: var(--blue); margin-bottom: 6px; }
.debug-row { display: flex; justify-content: space-between; font-size: 11px; margin: 2px 0; }
.debug-lbl { color: var(--muted); }
.bar-container { margin: 3px 0; }
.bar-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 2px; }
.bar       { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 3px; transition: width 0.3s; }

/* ── Whiteboard tab ─────────────────────────────────────────────────────────── */
#tab-whiteboard { padding: 0; overflow: hidden; }
#wb-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
#wb-toolbar label { font-size: 10px; color: var(--muted); }
#wb-body { flex: 1; overflow-y: auto; padding: 8px; }
.wb-section { margin-bottom: 12px; }
.wb-section-title {
  font-size: 11px;
  color: var(--blue);
  font-weight: bold;
  margin-bottom: 5px;
  padding-bottom: 3px;
  border-bottom: 1px solid var(--border);
}
.wb-group { margin-bottom: 8px; }
.wb-group-header {
  font-size: 10px;
  color: var(--muted);
  font-weight: bold;
  margin-bottom: 3px;
  padding: 2px 4px;
  background: rgba(33,38,45,0.5);
  border-radius: 3px;
}
.wb-table { width: 100%; border-collapse: collapse; font-size: 10px; }
.wb-table th {
  color: var(--muted);
  text-align: left;
  padding: 2px 5px;
  border-bottom: 1px solid var(--border);
  font-weight: normal;
}
.wb-table td { padding: 2px 5px; border-bottom: 1px solid rgba(33,38,45,0.5); }
.wb-entry-type {
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: bold;
}
.wb-history-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 3px 0;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
}
.wb-history-time { color: var(--muted); flex-shrink: 0; min-width: 40px; }

/* ── Incidents / MAD Debate tab ─────────────────────────────────────────────── */
.inc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
  flex-shrink: 0;
}
.inc-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  background: rgba(33,38,45,0.6);
  flex-wrap: wrap;
}
.inc-id   { font-size: 11px; font-weight: bold; color: var(--blue); }
.inc-desc { font-size: 10px; color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* isCritical badge */
.crit-badge {
  padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; flex-shrink: 0;
}
.crit-true  { background: rgba(248,81,73,0.25); color: var(--red);   border: 1px solid var(--red); }
.crit-false { background: rgba(139,148,158,0.15); color: var(--muted); border: 1px solid var(--border); }
.status-badge {
  padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; flex-shrink: 0;
}
.status-Debating { color: var(--orange); border: 1px solid var(--orange); animation: badgePulse 2s ease-in-out infinite; }
.status-Resolved { color: var(--green);  border: 1px solid var(--green); }
.inc-meta { font-size: 10px; color: var(--muted); padding: 4px 10px 0; display:flex; gap:16px; flex-wrap:wrap; }
.inc-meta span { white-space: nowrap; }
.inc-context { font-size: 10px; color: var(--muted); padding: 3px 10px 0; line-height: 1.4; white-space: pre-wrap; }
.inc-rounds { padding: 8px 10px 10px; }
.inc-round-header {
  font-size: 10px; color: var(--blue); font-weight: bold;
  margin: 8px 0 4px;
  border-left: 3px solid var(--blue); padding-left: 6px;
}
.debate-entry {
  display: flex;
  gap: 8px;
  padding: 5px 6px;
  border-radius: 4px;
  margin-bottom: 4px;
  background: rgba(22,27,34,0.7);
  border: 1px solid var(--border);
  font-size: 10px;
}
.de-body       { flex: 1; min-width: 0; }
.de-author     { color: var(--blue); font-weight: bold; margin-bottom: 2px; }
.de-content    { color: var(--text); line-height: 1.5; word-break: break-word; }
.de-conf       { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
.conf-bar      { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.conf-fill     { height: 100%; border-radius: 2px; }
.conf-label    { font-size: 9px; color: var(--muted); white-space: nowrap; }
.inc-resolution {
  margin: 6px 10px 10px;
  padding: 6px 8px;
  background: rgba(63,185,80,0.08);
  border: 1px solid rgba(63,185,80,0.3);
  border-radius: 4px;
  font-size: 10px;
}
.inc-res-title    { color: var(--green); font-weight: bold; margin-bottom: 3px; }
.inc-res-body     { color: var(--text); line-height: 1.5; word-break: break-word; }
.inc-directive    { font-size: 9px; margin-top: 4px; padding: 3px 6px; background: rgba(88,166,255,0.07); border-left: 2px solid var(--blue); border-radius: 2px; }
.inc-dir-agent    { color: var(--blue); font-weight: bold; }
.inc-dir-module   { color: var(--orange); margin: 0 4px; }
.inc-dir-instr    { color: var(--text); }
.inc-empty { color: var(--muted); font-size: 11px; text-align: center; padding: 30px; }

/* ── Memory tab ────────────────────────────────────────────────────────────── */
#tab-memory { padding: 0; overflow: hidden; }
#mem-toolbar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 5px 8px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: var(--card);
}
#mem-toolbar label { font-size: 10px; color: var(--muted); }
#mem-toolbar select { font-size: 10px; padding: 1px 4px; }
#mem-body { flex: 1; overflow-y: auto; padding: 8px; }

/* Kind 颜色映射（小写类名对应 AgentMemoryKind） */
.mem-kind-observation  { background:rgba(88,166,255,0.12); color:#58a6ff; border:1px solid #58a6ff44; }
.mem-kind-goal         { background:rgba(63,185,80,0.12);  color:#3fb950; border:1px solid #3fb95044; }
.mem-kind-plan         { background:rgba(188,140,255,0.12);color:#bc8cff; border:1px solid #bc8cff44; }
.mem-kind-decision     { background:rgba(210,153,34,0.12); color:#d29922; border:1px solid #d2992244; }
.mem-kind-outcome      { background:rgba(248,81,73,0.12);  color:#f85149; border:1px solid #f8514944; }
.mem-kind-coordination { background:rgba(57,211,83,0.12);  color:#39d353; border:1px solid #39d35344; }
.mem-kind-reflection   { background:rgba(188,140,255,0.2); color:#bc8cff; border:1px solid #bc8cff66; }
.mem-kind-policy       { background:rgba(88,166,255,0.2);  color:#58a6ff; border:1px solid #58a6ff66; }
.mem-kind-worldstate   { background:rgba(139,148,158,0.12);color:#8b949e; border:1px solid #8b949e44; }
.mem-kind-relationship { background:rgba(255,152,0,0.12);  color:#ff9800; border:1px solid #ff980044; }

/* 记忆卡片 */
.mem-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:5px; padding:7px 10px; margin-bottom:5px; flex-shrink:0;
}
.mem-card-header { display:flex; align-items:center; gap:5px; margin-bottom:3px; flex-wrap:wrap; }
.mem-kind-badge  { padding:1px 6px; border-radius:3px; font-size:9px; font-weight:bold; flex-shrink:0; }
.mem-depth-badge {
  padding:1px 5px; border-radius:3px; font-size:9px; font-weight:bold;
  background:rgba(188,140,255,0.18); color:#bc8cff; border:1px solid #bc8cff44; flex-shrink:0;
}
.mem-proc-badge  {
  padding:1px 5px; border-radius:3px; font-size:9px;
  background:rgba(63,185,80,0.12); color:#3fb950; border:1px solid #3fb95044; flex-shrink:0;
}
.mem-status-badge     { padding:1px 5px; border-radius:3px; font-size:9px; flex-shrink:0; }
.mem-status-Active    { background:rgba(63,185,80,0.1);  color:#3fb950; }
.mem-status-Completed { background:rgba(88,166,255,0.1); color:#58a6ff; }
.mem-status-Failed    { background:rgba(248,81,73,0.1);  color:#f85149; }
.mem-status-Archived  { background:rgba(139,148,158,0.1);color:#8b949e; }
.mem-age { font-size:9px; color:var(--muted); margin-left:auto; white-space:nowrap; }
.mem-imp-bar {
  height:3px; border-radius:2px; margin:3px 0;
  /* --imp-color 由内联 style 注入 */
}
.mem-summary { font-size:11px; color:var(--text); line-height:1.5; word-break:break-word; margin-bottom:2px; }
.mem-detail  { display:none; margin-top:5px; border-top:1px solid var(--border); padding-top:5px; }
.mem-detail.open { display:block; }
.mem-detail-row { display:flex; gap:4px; margin:1px 0; font-size:10px; }
.mem-detail-lbl { color:var(--muted); flex-shrink:0; min-width:58px; }
.mem-detail-val { color:var(--text); word-break:break-word; flex:1; }
.mem-tag-chip {
  display:inline-block; padding:0 5px; border-radius:3px; font-size:9px;
  background:var(--border); color:var(--muted); margin:1px 2px;
}

/* 洞察卡片 */
.insight-card {
  background:rgba(188,140,255,0.04);
  border:1px solid rgba(188,140,255,0.25); border-left:3px solid #bc8cff;
  border-radius:5px; padding:8px 10px; margin-bottom:6px; flex-shrink:0;
}
.insight-header   { display:flex; align-items:center; gap:6px; margin-bottom:4px; flex-wrap:wrap; }
.insight-depth    {
  padding:1px 6px; border-radius:3px; font-size:9px; font-weight:bold; flex-shrink:0;
}
.insight-title    { font-size:11px; font-weight:bold; color:#bc8cff; flex:1; min-width:0; word-break:break-word; }
.insight-ttl      { font-size:9px; color:var(--orange); white-space:nowrap; }
.insight-never    { font-size:9px; color:var(--muted); white-space:nowrap; }
.insight-expired  { font-size:9px; color:var(--red); white-space:nowrap; }
.insight-conf-bar { height:3px; border-radius:2px; margin:3px 0; background:var(--border); overflow:hidden; }
.insight-conf-fill{ height:100%; border-radius:2px; }
.insight-field    { font-size:10px; margin:4px 0; line-height:1.5; }
.insight-field-lbl{ color:var(--muted); font-size:9px; margin-bottom:1px; }

/* ── Scrollbar ─────────────────────────────────────────────────────────────── */
::-webkit-scrollbar       { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<div id="header">
  <h1>多智能体仿真仪表板</h1>
  <span class="badge" id="conn-badge">连接中…</span>
  <span class="hdr-stat" id="hdr-agents">0 Agents</span>
  <span class="hdr-stat" id="hdr-msgs">0 消息</span>
  <span class="hdr-stat" id="hdr-ping">—</span>
  <div id="hdr-right">
    <span style="color:var(--muted);font-size:11px">刷新:</span>
    <select id="interval-sel" onchange="changeInterval(this.value)">
      <option value="500">0.5s</option>
      <option value="1000" selected>1s</option>
      <option value="2000">2s</option>
    </select>
  </div>
</div>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Left: Map -->
  <div id="left-panel">
    <div id="map-container">
      <canvas id="mapCanvas"></canvas>
      <div id="map-overlay">点击 Agent 选中 · 再次点击取消</div>
      <div id="tooltip"></div>
      <div id="map-legend" style="position:absolute;top:8px;left:8px;background:rgba(13,17,23,0.82);border:1px solid #21262d;border-radius:4px;padding:6px 10px;font-size:10px;pointer-events:none;z-index:10">
        <div style="color:#8b949e;margin-bottom:4px;font-weight:bold">地图图例</div>
        <div style="display:flex;flex-direction:column;gap:2px" id="map-legend-body"></div>
      </div>
      <button id="map-reset-btn" onclick="zoomLevel=1;panX=0;panY=0" style="position:absolute;bottom:34px;right:8px;background:rgba(13,17,23,0.82);color:#8b949e;border:1px solid #21262d;border-radius:3px;padding:3px 8px;font-family:var(--font);font-size:10px;cursor:pointer;z-index:10">重置视图</button>
    </div>
  </div>

  <!-- Divider -->
  <div id="divider"></div>

  <!-- Right: Tabs -->
  <div id="right-panel">
    <div id="tabs-header">
      <button class="tab-btn active" onclick="switchTab('agents')">Agents</button>
      <button class="tab-btn" onclick="switchTab('comms')">通信</button>
      <button class="tab-btn" onclick="switchTab('llm')" id="tab-btn-llm">LLM 日志</button>
      <button class="tab-btn" onclick="switchTab('whiteboard')">白板</button>
      <button class="tab-btn" onclick="switchTab('incidents')" id="tab-btn-incidents">辩论 <span id="incident-badge" style="display:none;background:var(--red);color:#fff;border-radius:8px;padding:0 5px;font-size:9px;margin-left:2px">0</span></button>
      <button class="tab-btn" onclick="switchTab('control')">控制</button>
      <button class="tab-btn" onclick="switchTab('memory')">记忆</button>
      <button class="tab-btn" onclick="switchTab('emergence')">涌现</button>
      <button class="tab-btn" onclick="switchTab('debug')">调试</button>
    </div>
    <div id="tab-content">

      <!-- Agents tab -->
      <div class="tab-pane active" id="tab-agents">
        <div class="agents-toolbar">
          <button class="view-btn active" id="view-agent-btn" onclick="setAgentView('agent')">按 Agent</button>
          <button class="view-btn" id="view-team-btn" onclick="setAgentView('team')">按 Team</button>
        </div>
        <div class="agents-body" id="agents-body"></div>
      </div>

      <!-- Comms tab -->
      <div class="tab-pane" id="tab-comms">
        <div id="comms-filter">
          <button class="filter-btn active" onclick="setMsgFilter('',this)">全部</button>
          <button class="filter-btn" onclick="setMsgFilter('BoardUpdate',this)">BoardUpdate</button>
          <button class="filter-btn" onclick="setMsgFilter('SlotBroadcast',this)">SlotBroadcast</button>
          <button class="filter-btn" onclick="setMsgFilter('SlotSelect',this)">SlotSelect</button>
          <button class="filter-btn" onclick="setMsgFilter('StartExecution',this)">StartExec</button>
          <button class="filter-btn" onclick="setMsgFilter('GroupBootstrap',this)">GroupBoot</button>
        </div>
        <div id="comms-list"></div>
      </div>

      <!-- LLM Logs tab -->
      <div class="tab-pane" id="tab-llm">
        <div id="llm-toolbar">
          <label>Agent:</label>
          <select id="llm-agent-filter" onchange="renderLlmLogs()">
            <option value="">全部</option>
          </select>
          <label>类型:</label>
          <select id="llm-type-filter" onchange="renderLlmLogs()">
            <option value="">全部</option>
            <option value="send">send</option>
            <option value="receive">receive</option>
            <option value="error">error</option>
          </select>
          <label>阶段:</label>
          <select id="llm-tag-filter" onchange="renderLlmLogs()">
            <option value="">全部</option>
          </select>
          <button class="ctrl-btn" style="margin-left:auto;padding:2px 10px;font-size:10px" onclick="fetchLlmLogs()">刷新</button>
        </div>
        <div id="llm-list"></div>
      </div>

      <!-- Whiteboard tab -->
      <div class="tab-pane" id="tab-whiteboard">
        <div id="wb-toolbar">
          <label>Group:</label>
          <select id="wb-group-filter" onchange="renderWhiteboard()">
            <option value="">全部</option>
          </select>
          <button class="ctrl-btn" style="margin-left:auto;padding:2px 10px;font-size:10px" onclick="fetchWhiteboard()">刷新</button>
        </div>
        <div id="wb-body"></div>
      </div>

      <!-- Incidents / MAD Debate tab -->
      <div class="tab-pane" id="tab-incidents">
        <div id="inc-toolbar" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)">
          <label style="font-size:10px;color:var(--muted)">状态:</label>
          <select id="inc-status-filter" onchange="renderIncidents()" style="font-size:10px">
            <option value="">全部</option>
            <option value="Debating">Debating</option>
            <option value="Resolved">Resolved</option>
          </select>
          <label style="font-size:10px;color:var(--muted)">类型:</label>
          <select id="inc-crit-filter" onchange="renderIncidents()" style="font-size:10px">
            <option value="">全部</option>
            <option value="critical">Critical</option>
            <option value="normal">Normal</option>
          </select>
          <button class="ctrl-btn" style="margin-left:auto;padding:2px 10px;font-size:10px" onclick="fetchIncidents()">刷新</button>
        </div>
        <div id="inc-body" style="flex:1;overflow-y:auto;padding:8px;gap:0"></div>
      </div>

      <!-- Control tab -->
      <div class="tab-pane" id="tab-control">
        <!-- Model Switch -->
        <div class="ctrl-section">
          <div class="ctrl-title">LLM 模型切换</div>
          <div class="preset-btns">
            <button class="preset-btn" onclick="setModelPreset('deepseek-chat')">deepseek-chat</button>
            <button class="preset-btn" onclick="setModelPreset('deepseek-reasoner')">deepseek-reasoner</button>
            <button class="preset-btn" onclick="setModelPreset('qwen-plus')">qwen-plus</button>
            <button class="preset-btn" onclick="setModelPreset('qwen-turbo')">qwen-turbo</button>
            <button class="preset-btn" onclick="setModelPreset('qwen-max')">qwen-max</button>
          </div>
          <div class="ctrl-row">
            <label class="ctrl-label">Model:</label>
            <input class="ctrl-input" id="model-input" type="text" placeholder="deepseek-chat">
            <button class="ctrl-btn" onclick="submitModel()">切换</button>
          </div>
          <div class="ctrl-status" id="model-status"></div>
        </div>

        <!-- Task Submit -->
        <div class="ctrl-section">
          <div class="ctrl-title">任务发布</div>
          <div class="ctrl-row">
            <label class="ctrl-label">任务描述:</label>
          </div>
          <textarea class="ctrl-input" id="task-input" placeholder="输入任务描述…"></textarea>
          <div class="ctrl-row" style="margin-top:6px">
            <label class="ctrl-label">Agent 数量:</label>
            <input class="num-input" id="agent-count-input" type="number" min="1" value="1">
            <button class="ctrl-btn" onclick="submitTask()">发布任务</button>
          </div>
          <div class="ctrl-status" id="task-status"></div>
        </div>
      </div>

      <!-- Memory tab -->
      <div class="tab-pane" id="tab-memory">
        <!-- 顶部工具栏 -->
        <div id="mem-toolbar">
          <label>Agent:</label>
          <select id="mem-agent-filter" onchange="renderMemory()">
            <option value="">全部</option>
          </select>
          <label style="margin-left:4px">类型:</label>
          <select id="mem-kind-filter" onchange="renderMemory()">
            <option value="">全部</option>
            <option>Observation</option><option>Goal</option><option>Plan</option>
            <option>Decision</option><option>Outcome</option><option>Coordination</option>
            <option>Reflection</option><option>Policy</option><option>WorldState</option>
            <option>Relationship</option>
          </select>
          <label style="margin-left:4px">
            <input type="checkbox" id="mem-proc-only" onchange="renderMemory()"> 程序性提示
          </label>
          <button class="ctrl-btn" style="margin-left:auto;padding:2px 10px;font-size:10px"
                  onclick="fetchMemory()">刷新</button>
        </div>
        <!-- 子标签：记忆列表 / 反思洞察 -->
        <div style="display:flex;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0">
          <button class="tab-btn active" id="mem-sub-memories"
                  onclick="switchMemSub('memories')" style="font-size:10px;padding:7px 12px">记忆列表</button>
          <button class="tab-btn" id="mem-sub-insights"
                  onclick="switchMemSub('insights')" style="font-size:10px;padding:7px 12px">反思洞察</button>
          <button class="tab-btn" id="mem-sub-policies"
                  onclick="switchMemSub('policies')" style="font-size:10px;padding:7px 12px">持久化规律库</button>
          <span id="mem-total-count"
                style="margin-left:auto;align-self:center;padding-right:10px;font-size:9px;color:var(--muted)"></span>
        </div>
        <div id="mem-body"></div>
        <!-- 持久化规律库面板（独立于 mem-body，不参与 renderMemory 渲染逻辑） -->
        <div id="mem-policies-panel" style="display:none;padding:8px;overflow-y:auto;flex:1">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
            <input id="policy-search" type="text" placeholder="搜索规律/洞察…"
                   oninput="if(lastPoliciesData)renderPolicies(lastPoliciesData)"
                   style="flex:1;min-width:160px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px">
            <select id="policy-tag-filter" onchange="if(lastPoliciesData)renderPolicies(lastPoliciesData)"
                    style="padding:4px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px">
              <option value="">全部标签</option>
            </select>
            <button class="ctrl-btn" onclick="fetchPolicies()" style="padding:2px 10px;font-size:10px">刷新</button>
          </div>
          <div id="policy-stats" style="font-size:11px;color:var(--muted);margin-bottom:8px"></div>
          <div style="font-size:12px;font-weight:600;color:#a78bfa;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)">Policy 规律（可复用原则）</div>
          <div id="policy-list"></div>
          <div style="font-size:12px;font-weight:600;color:#60a5fa;margin-top:14px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)">反思洞察（跨任务抽象）</div>
          <div id="persistent-insight-list"></div>
        </div>
      </div>

      <!-- Emergence tab -->
      <div class="tab-pane" id="tab-emergence">
        <div id="emer-toolbar" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)">
          <label style="font-size:10px;color:var(--muted)">Agent:</label>
          <select id="emer-agent-filter" onchange="renderEmergence()" style="font-size:10px">
            <option value="">全部</option>
          </select>
          <button class="ctrl-btn" style="margin-left:auto;padding:2px 10px;font-size:10px" onclick="fetchEmergence()">刷新</button>
        </div>
        <div id="emer-body" style="flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px"></div>
      </div>

      <!-- Debug tab -->
      <div class="tab-pane" id="tab-debug"></div>

    </div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════════════
// Constants
// ══════════════════════════════════════════════════════════════════════════════
const TEAM_COLORS = [
  '#e94560','#4caf50','#2196f3','#ff9800',
  '#9c27b0','#00bcd4','#ff5722','#607d8b',
  '#795548','#009688','#cddc39','#e91e63'
];
const MSG_COLORS = {
  BoardUpdate:    '#58a6ff',
  SlotBroadcast:  '#d29922',
  SlotSelect:     '#39d353',
  StartExecution: '#bc8cff',
  GroupBootstrap: '#f85149',
};
const CELL_COLORS = [
  '#0d1117', // 0 Free
  '#2d3a4a', // 1 Building
  '#0e3a5c', // 2 Water
  '#1c2a1c', // 3 Road
  '#1f2e10', // 4 Expressway
  '#1a1a2e', // 5
  '#1a1a2e', // 6
  '#1a2e1a', // 7 Green
];

const FEATURE_STYLES = {
  building: { fill:'rgba(100,140,180,0.25)', stroke:'#5588bb', strokeW:1.5, minR:4 },
  road:     { fill:'rgba(180,160,80,0.15)',  stroke:'#aa9944', strokeW:1,   minR:3 },
  water:    { fill:'rgba(30,100,200,0.30)',  stroke:'#3366cc', strokeW:1.5, minR:4 },
  forest:   { fill:'rgba(40,140,60,0.25)',   stroke:'#3a8a40', strokeW:1.5, minR:4 },
  green:    { fill:'rgba(60,160,80,0.20)',   stroke:'#44aa55', strokeW:1,   minR:3 },
  parking:  { fill:'rgba(120,100,60,0.20)',  stroke:'#887744', strokeW:1,   minR:3 },
  sports:   { fill:'rgba(200,120,40,0.20)',  stroke:'#cc7722', strokeW:1,   minR:3 },
  bridge:   { fill:'rgba(200,180,100,0.25)',stroke:'#ccbb66', strokeW:1.5, minR:3 },
  default:  { fill:'rgba(150,150,150,0.15)', stroke:'#888888', strokeW:1,   minR:3 },
};

const TAB_NAMES = ['agents','comms','llm','whiteboard','incidents','control','memory','debug'];

const WB_TYPE_COLORS = {
  IntentAnnounce:  '#58a6ff',
  ReadySignal:     '#3fb950',
  DoneSignal:      '#39d353',
  StatusUpdate:    '#8b949e',
  RefereeNotice:   '#bc8cff',
  IncidentAnnounce:'#f85149',
  DebateConsensus: '#3fb950',
};

const LLM_TAG_COLORS = {
  'LLM#1': '#58a6ff',
  'LLM#2': '#39d353',
  'LLM#3': '#d29922',
  'LLM#4': '#d29922',
  'LLM#5': '#bc8cff',
};
function llmTagColor(tag) {
  if (!tag) return 'transparent';
  if (LLM_TAG_COLORS[tag]) return LLM_TAG_COLORS[tag];
  if (tag.startsWith('ADM_Roll')) return '#3fb950';
  if (tag.toLowerCase().includes('error')) return '#f85149';
  return '#8b949e';
}

// ══════════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════════
let agents         = [];
let messages       = [];
let posHistory     = {};
let gridmap        = null;
let mapMeta        = { cellSize: 1, gridWidth: 200, gridLength: 200, originX: 0, originZ: 0, features: [] };
let llmLogs        = [];
let whiteboardData = { entries: [], history: [] };

let selectedId   = null;
let pollTimer    = null;
let msgFilter    = '';
let pingMs       = 0;
let agentView    = 'agent';   // 'agent' | 'team'
let currentTab   = 'agents';

// ── 记忆 / 洞察面板状态 ───────────────────────────────────────────────────────
let memoryData     = [];          // AgentMemoryPayload[]
let memSubTab      = 'memories';  // 'memories' | 'insights' | 'policies'
let lastPoliciesData = null;      // PersistentMemoryPayload

// ── 地图气泡状态 ──────────────────────────────────────────────────────────────
const bubbleMap   = new Map(); // agentId → [{key, msg, eventType, shownAt}]
const BUBBLE_SHOW = 8;         // 秒：不透明持续时间
const BUBBLE_FADE = 1.5;       // 秒：淡出时间
const BUBBLE_MAX  = 3;         // 每个 agent 最多显示气泡数
const BUBBLE_COLORS = {
  move_start:      '#58a6ff',
  waypoint_timeout:'#d29922',
  obstacle_replan: '#bc8cff',
  arrive:          '#3fb950',
};

// Expand state persists across polls
const expandedSet = new Set();

// Communication incremental rendering
let renderedMsgKeys = new Set();

// Communication arcs animation state
let activeArcs = [];

// Offscreen background canvas
let bgCanvas = null;
let bgCtx    = null;
let bgReady  = false;

// Poll interval
let pollInterval = 1000;

// Zoom / Pan state
let zoomLevel = 1.0;
let panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0;

// ══════════════════════════════════════════════════════════════════════════════
// Utilities
// ══════════════════════════════════════════════════════════════════════════════
function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function teamColor(teamId) {
  return TEAM_COLORS[(teamId || 0) % TEAM_COLORS.length];
}

function statusClass(s) {
  if (!s) return 's-other';
  const l = s.toLowerCase();
  if (l === 'idle' || l === 'done') return 's-idle';
  if (l === 'active' || l === 'running') return 's-running';
  if (['thinking','interpreting','negotiating','replanning',
       'parsing','slotgen','slotpick','stepgen','grouping'].includes(l)) return 's-thinking';
  if (l === 'failed' || l === 'error') return 's-error';
  return 's-other';
}

function batteryColor(v) {
  if (v > 0.6) return '#3fb950';
  if (v > 0.3) return '#d29922';
  return '#f85149';
}

function formatTime(ts) {
  if (!ts) return '—';
  const d = typeof ts === 'number' ? ts : parseFloat(ts);
  if (isNaN(d)) return ts;
  const m = Math.floor(d / 60), s = Math.floor(d % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════════════════════════════════════
// Canvas
// ══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('mapCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const cont = document.getElementById('map-container');
  const W = cont.clientWidth, H = cont.clientHeight;
  if (canvas.width !== W || canvas.height !== H) {
    canvas.width  = W;
    canvas.height = H;
    bgReady = false;
    if (gridmap) buildBgCanvas();
  }
}

// World → canvas
function worldToCanvas(wx, wz) {
  const W = canvas.width, H = canvas.height;
  const mapW = mapMeta.gridWidth  * mapMeta.cellSize;
  const mapH = mapMeta.gridLength * mapMeta.cellSize;
  const scale = Math.min(W / mapW, H / mapH) * 0.92;
  const offX  = (W - mapW * scale) / 2;
  const offZ  = (H - mapH * scale) / 2;
  const cx = offX + (wx - mapMeta.originX) * scale;
  const cy = offZ + (wz - mapMeta.originZ) * scale;
  return [cx, cy, scale];
}

function buildBgCanvas() {
  if (!gridmap) return;
  const W = canvas.width, H = canvas.height;
  if (!bgCanvas) { bgCanvas = document.createElement('canvas'); bgCtx = bgCanvas.getContext('2d'); }
  bgCanvas.width = W; bgCanvas.height = H;

  const mapW = mapMeta.gridWidth  * mapMeta.cellSize;
  const mapH = mapMeta.gridLength * mapMeta.cellSize;
  const scale = Math.min(W / mapW, H / mapH) * 0.92;
  const offX  = (W - mapW * scale) / 2;
  const offZ  = (H - mapH * scale) / 2;

  bgCtx.fillStyle = '#0d1117';
  bgCtx.fillRect(0, 0, W, H);

  const gw = gridmap.w, gh = gridmap.h;
  const cw = (mapW * scale) / gw;
  const ch = (mapH * scale) / gh;

  for (let z = 0; z < gh; z++) {
    for (let x = 0; x < gw; x++) {
      const t = gridmap.cells[z][x];
      bgCtx.fillStyle = CELL_COLORS[t] || '#0d1117';
      bgCtx.fillRect(offX + x * cw, offZ + z * ch, Math.ceil(cw), Math.ceil(ch));
    }
  }

  // Features - per-kind fill+stroke using FEATURE_STYLES
  for (const f of (mapMeta.features || [])) {
    const [cx, cy, sc] = worldToCanvas(f.x, f.z);
    const kind = (f.kind || 'default').toLowerCase();
    const sty  = FEATURE_STYLES[kind] || FEATURE_STYLES.default;
    const r    = Math.max(sty.minR, f.radius * sc);
    bgCtx.beginPath();
    bgCtx.arc(cx, cy, r, 0, Math.PI * 2);
    bgCtx.fillStyle = sty.fill;
    bgCtx.fill();
    bgCtx.strokeStyle = sty.stroke;
    bgCtx.lineWidth = sty.strokeW;
    bgCtx.stroke();
  }

  bgReady = true;
}

// Screen (canvas element) coords → base (pre-zoom/pan) canvas coords
function screenToBase(sx, sy) {
  return [(sx - panX) / zoomLevel, (sy - panY) / zoomLevel];
}

// ══════════════════════════════════════════════════════════════════════════════
// Draw loop
// ══════════════════════════════════════════════════════════════════════════════
let animFrame = null;
function startDrawLoop() {
  if (animFrame) return;
  function loop() {
    drawFrame();
    animFrame = requestAnimationFrame(loop);
  }
  animFrame = requestAnimationFrame(loop);
}

function drawFrame() {
  resizeCanvas();
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Apply zoom/pan transform
  ctx.save();
  ctx.setTransform(zoomLevel, 0, 0, zoomLevel, panX, panY);

  if (bgReady) {
    ctx.drawImage(bgCanvas, 0, 0);
  } else {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W / zoomLevel, H / zoomLevel);
  }

  const now = performance.now() / 1000;

  // Arcs
  activeArcs = activeArcs.filter(a => now - a.startTime < a.duration);
  for (const arc of activeArcs) {
    const p = Math.min(1, (now - arc.startTime) / arc.duration);
    const alpha = 1 - p;
    ctx.globalAlpha = alpha;
    if (arc.isBroadcast) {
      ctx.beginPath();
      ctx.arc(arc.x1, arc.y1, arc.broadcastR * p, 0, Math.PI * 2);
      ctx.strokeStyle = arc.color;
      ctx.lineWidth = 1.5 / zoomLevel;
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(arc.x1, arc.y1);
      ctx.lineTo(arc.x2, arc.y2);
      ctx.strokeStyle = arc.color;
      ctx.lineWidth = 1.5 / zoomLevel;
      ctx.stroke();

      // moving dot
      const dx = arc.x1 + (arc.x2 - arc.x1) * p;
      const dy = arc.y1 + (arc.y2 - arc.y1) * p;
      ctx.beginPath();
      ctx.arc(dx, dy, 3 / zoomLevel, 0, Math.PI * 2);
      ctx.fillStyle = arc.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Trails
  for (const [aid, hist] of Object.entries(posHistory)) {
    if (!hist || hist.length < 2) continue;
    const col = teamColor(agents.find(a => a.agentId === aid)?.teamId ?? 0);
    ctx.beginPath();
    let first = true;
    for (const pt of hist) {
      const [cx, cy] = worldToCanvas(pt[0], pt[2]);
      if (first) { ctx.moveTo(cx, cy); first = false; }
      else ctx.lineTo(cx, cy);
    }
    ctx.strokeStyle = col + '55';
    ctx.lineWidth = 1 / zoomLevel;
    ctx.stroke();
  }

  // Node labels for large features (building/water/bridge/sports)
  const labelKinds = new Set(['building','water','bridge','sports']);
  for (const f of (mapMeta.features || [])) {
    const kind = (f.kind || '').toLowerCase();
    if (!labelKinds.has(kind)) continue;
    const [fcx, fcy, fsc] = worldToCanvas(f.x, f.z);
    const rPx = f.radius * fsc;
    if (rPx < 8) continue;
    const fontSize = Math.max(8, Math.min(14, 9 * fsc / zoomLevel));
    ctx.font = fontSize + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 3 / zoomLevel;
    ctx.fillStyle = '#ffffff';
    ctx.fillText(f.name, fcx, fcy);
    ctx.shadowBlur = 0;
  }

  // Agents
  for (const ag of agents) {
    const [cx, cy] = worldToCanvas(ag.position[0], ag.position[2]);
    const col = teamColor(ag.teamId);
    const isSel = ag.agentId === selectedId;
    const r = (isSel ? 7 : 5) / zoomLevel;

    ctx.beginPath();
    ctx.arc(cx, cy, r + 2 / zoomLevel, 0, Math.PI * 2);
    ctx.fillStyle = col + '33';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();

    if (isSel) {
      ctx.beginPath();
      ctx.arc(cx, cy, r + 4 / zoomLevel, 0, Math.PI * 2);
      ctx.strokeStyle = col;
      ctx.lineWidth = 2 / zoomLevel;
      ctx.stroke();

      // Perception range circle (dashed)
      const percRange = ag.perceptionRange ?? 0;
      if (percRange > 0) {
        const [,, sc] = worldToCanvas(ag.position[0], ag.position[2]);
        const percR = percRange * sc;
        ctx.beginPath();
        ctx.arc(cx, cy, percR, 0, Math.PI * 2);
        ctx.strokeStyle = col + '88';
        ctx.lineWidth = 1 / zoomLevel;
        ctx.setLineDash([4 / zoomLevel, 4 / zoomLevel]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.font = Math.max(8, 10 / zoomLevel) + 'px monospace';
        ctx.fillStyle = col + 'cc';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText('r=' + percRange.toFixed(0) + 'm', cx + percR + 4 / zoomLevel, cy);
      }

      // Detected objects (small dots on map)
      const detObjs = ag.detectedObjects || [];
      if (detObjs.length > 0) {
        for (const obj of detObjs) {
          if (!obj.position) continue;
          const [ox, oy] = worldToCanvas(obj.position[0], obj.position[2]);
          const ns = (typeof nodeStyle === 'function') ? nodeStyle(obj.nodeType) : { color: '#8b949e' };
          const dotR = Math.max(2, 3 / zoomLevel);
          ctx.beginPath();
          ctx.arc(ox, oy, dotR, 0, Math.PI * 2);
          ctx.fillStyle = ns.color + 'cc';
          ctx.fill();
        }
      }

      // Planned targets with dashed lines + diamond markers
      const targets = ag.plannedTargets || [];
      for (const tname of targets) {
        const feat = (mapMeta.features || []).find(f => f.name === tname);
        if (!feat) continue;
        const [tx, ty] = worldToCanvas(feat.x, feat.z);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(tx, ty);
        ctx.strokeStyle = col + '99';
        ctx.lineWidth = 1.5 / zoomLevel;
        ctx.setLineDash([6 / zoomLevel, 4 / zoomLevel]);
        ctx.stroke();
        ctx.setLineDash([]);
        const ds = 5 / zoomLevel;
        ctx.beginPath();
        ctx.moveTo(tx, ty - ds);
        ctx.lineTo(tx + ds, ty);
        ctx.lineTo(tx, ty + ds);
        ctx.lineTo(tx - ds, ty);
        ctx.closePath();
        ctx.fillStyle = col + 'cc';
        ctx.fill();
        ctx.strokeStyle = col;
        ctx.lineWidth = 1 / zoomLevel;
        ctx.stroke();
      }
    }

    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.max(6, 8 / zoomLevel) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ag.agentId.slice(-2), cx, cy);
  }

  // 气泡绘制（在 zoom/pan 变换坐标系内，随地图缩放平移）
  drawBubbles();

  ctx.restore();

  // Overlay: zoom percentage
  const overlayEl = document.getElementById('map-overlay');
  if (overlayEl) {
    overlayEl.textContent = '点击 Agent 选中 · 再次点击取消  |  缩放: ' + Math.round(zoomLevel * 100) + '%';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// Click / hover on canvas
// ══════════════════════════════════════════════════════════════════════════════
canvas.addEventListener('click', e => {
  if (e.button !== 0) return;
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const [mx, my] = screenToBase(sx, sy);
  let hit = null;
  for (const ag of agents) {
    const [cx, cy] = worldToCanvas(ag.position[0], ag.position[2]);
    if (Math.hypot(cx - mx, cy - my) < 10) { hit = ag.agentId; break; }
  }
  selectedId = (hit === selectedId) ? null : hit;
  renderAgents();
});

canvas.addEventListener('mousemove', e => {
  if (isPanning) {
    panX += e.clientX - panStartX;
    panY += e.clientY - panStartY;
    panStartX = e.clientX;
    panStartY = e.clientY;
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const [mx, my] = screenToBase(sx, sy);
  const tip = document.getElementById('tooltip');
  let hit = null;

  // Agent hit detection (priority)
  for (const ag of agents) {
    const [cx, cy] = worldToCanvas(ag.position[0], ag.position[2]);
    if (Math.hypot(cx - mx, cy - my) < 12) { hit = ag; break; }
  }

  if (hit) {
    canvas.style.cursor = 'pointer';
    tip.style.display = 'block';
    tip.style.left = (sx + 14) + 'px';
    tip.style.top  = (sy - 10) + 'px';
    tip.style.borderLeft = '3px solid ' + teamColor(hit.teamId);
    tip.innerHTML = `<b style="color:${teamColor(hit.teamId)}">${escHtml(hit.agentId)}</b><br>
      Team ${hit.teamId} · ${escHtml(hit.role)}<br>
      ADM: <span style="color:var(--orange)">${escHtml(hit.admStatus)}</span><br>
      Plan: <span style="color:var(--blue)">${escHtml(hit.planState)}</span><br>
      Action: ${escHtml(hit.currentAction)} ${hit.currentTarget ? '→ ' + escHtml(hit.currentTarget) : ''}<br>
      Battery: ${(hit.battery * 100).toFixed(0)}%`;
    return;
  }

  // Feature hover detection
  let featHit = null;
  for (const f of (mapMeta.features || [])) {
    const [fcx, fcy, fsc] = worldToCanvas(f.x, f.z);
    const r = Math.max((FEATURE_STYLES[f.kind] || FEATURE_STYLES.default).minR, f.radius * fsc);
    if (Math.hypot(fcx - mx, fcy - my) <= r + 3) { featHit = f; break; }
  }

  if (featHit) {
    const kind = (featHit.kind || 'default').toLowerCase();
    const sty = FEATURE_STYLES[kind] || FEATURE_STYLES.default;
    canvas.style.cursor = 'pointer';
    tip.style.display = 'block';
    tip.style.left = (sx + 14) + 'px';
    tip.style.top  = (sy - 10) + 'px';
    tip.style.borderLeft = '3px solid ' + sty.stroke;
    tip.innerHTML = `<b style="color:${sty.stroke}">${escHtml(featHit.name)}</b><br>
      类型: ${escHtml(featHit.kind)}<br>
      坐标: (${featHit.x.toFixed(1)}, ${featHit.z.toFixed(1)})<br>
      半径: ${featHit.radius.toFixed(1)} m`;
  } else {
    canvas.style.cursor = 'crosshair';
    tip.style.display = 'none';
    tip.style.borderLeft = '';
  }
});
canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
  isPanning = false;
  canvas.style.cursor = 'crosshair';
});

// Zoom: mouse wheel
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  const newZoom = Math.max(0.3, Math.min(8.0, zoomLevel * factor));
  // Zoom centered on mouse position
  panX = mx - (mx - panX) * (newZoom / zoomLevel);
  panY = my - (my - panY) * (newZoom / zoomLevel);
  zoomLevel = newZoom;
}, { passive: false });

// Pan: right/middle mouse button
canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 2) {
    e.preventDefault();
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    canvas.style.cursor = 'grabbing';
  }
});

document.addEventListener('mouseup', e => {
  if (e.button === 1 || e.button === 2) {
    isPanning = false;
    canvas.style.cursor = 'crosshair';
  }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

// ══════════════════════════════════════════════════════════════════════════════
// Tab switching
// ══════════════════════════════════════════════════════════════════════════════
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const pane = document.getElementById('tab-' + name);
  if (pane) pane.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.trim() === {
      agents: 'Agents', comms: '通信', llm: 'LLM 日志',
      whiteboard: '白板', incidents: '辩论', control: '控制', memory: '记忆', emergence: '涌现', debug: '调试'
    }[name]) b.classList.add('active');
  });
  if (name === 'llm') fetchLlmLogs();
  if (name === 'whiteboard') fetchWhiteboard();
  if (name === 'incidents') fetchIncidents();
  if (name === 'memory') fetchMemory();
  if (name === 'emergence') fetchEmergence();
}

// ══════════════════════════════════════════════════════════════════════════════
// Agent view toggle
// ══════════════════════════════════════════════════════════════════════════════
function setAgentView(v) {
  agentView = v;
  document.getElementById('view-agent-btn').classList.toggle('active', v === 'agent');
  document.getElementById('view-team-btn').classList.toggle('active', v === 'team');
  renderAgents();
}

// ══════════════════════════════════════════════════════════════════════════════
// Agent rendering
// ══════════════════════════════════════════════════════════════════════════════
function renderAgents() {
  const body = document.getElementById('agents-body');
  if (agentView === 'team') {
    renderAgentsByTeam(body);
  } else {
    renderAgentsByAgent(body);
  }
}

function renderAgentsByAgent(container) {
  // Determine existing card IDs
  const existing = new Set();
  container.querySelectorAll('.agent-card[data-id]').forEach(c => existing.add(c.dataset.id));

  const incoming = new Set(agents.map(a => a.agentId));

  // Remove cards no longer present
  existing.forEach(id => {
    if (!incoming.has(id)) {
      const el = container.querySelector(`.agent-card[data-id="${CSS.escape(id)}"]`);
      if (el) el.remove();
    }
  });

  // Update or insert cards
  for (const ag of agents) {
    const id = ag.agentId;
    let card = container.querySelector(`.agent-card[data-id="${CSS.escape(id)}"]`);
    if (!card) {
      card = document.createElement('div');
      card.className = 'agent-card';
      card.dataset.id = id;
      card.onclick = () => { selectedId = (selectedId === id) ? null : id; renderAgents(); };
      container.appendChild(card);
    }
    updateAgentCard(card, ag);
  }
}

function renderAgentsByTeam(container) {
  // Group agents by team
  const teams = {};
  for (const ag of agents) {
    const tid = ag.teamId ?? 0;
    if (!teams[tid]) teams[tid] = [];
    teams[tid].push(ag);
  }

  // Clear and rebuild (team view is simpler to rebuild)
  container.innerHTML = '';
  for (const [tid, teamAgents] of Object.entries(teams)) {
    const col = teamColor(Number(tid));
    const roles = [...new Set(teamAgents.map(a => a.role))].join(', ');

    const group = document.createElement('div');
    group.className = 'team-group';

    const hdr = document.createElement('div');
    hdr.className = 'team-group-header';
    hdr.style.background = col + '18';
    hdr.style.border = `1px solid ${col}44`;
    hdr.innerHTML = `<div class="team-color-bar" style="background:${col}"></div>
      <span style="color:${col}">Team ${escHtml(tid)}</span>
      <span style="color:var(--muted);font-size:10px">${teamAgents.length} 成员 · ${escHtml(roles)}</span>`;
    group.appendChild(hdr);

    const cards = document.createElement('div');
    cards.className = 'team-group-cards';
    for (const ag of teamAgents) {
      const card = document.createElement('div');
      card.className = 'agent-card';
      card.dataset.id = ag.agentId;
      card.onclick = () => { selectedId = (selectedId === ag.agentId) ? null : ag.agentId; renderAgentsByTeam(container); };
      updateAgentCard(card, ag);
      cards.appendChild(card);
    }
    group.appendChild(cards);
    container.appendChild(group);
  }
}

function updateAgentCard(card, ag) {
  const id = ag.agentId;
  const col = teamColor(ag.teamId);
  const isSelected = id === selectedId;
  const isExpanded = expandedSet.has(id);

  card.style.borderLeftColor = col;
  card.classList.toggle('selected', isSelected);

  const batt = ag.battery ?? 0;
  const bc   = batteryColor(batt);
  const sc   = statusClass(ag.admStatus);

  // Teammates
  const teammates = agents.filter(a => a.agentId !== id && a.teamId === ag.teamId);
  const teammateChips = teammates.map(a =>
    `<span class="teammate-chip" style="color:${teamColor(a.teamId)};border-color:${teamColor(a.teamId)}44">${escHtml(a.agentId)}</span>`
  ).join('');

  card.innerHTML = `
    <div class="card-header">
      <span class="card-id" style="color:${col}">${escHtml(id)}</span>
      <span class="card-meta">
        ${escHtml(ag.type)} · ${escHtml(ag.role)}
        <span class="team-badge" style="background:${col}"">T${ag.teamId}</span>
      </span>
    </div>
    <div class="row">
      <span class="lbl">ADM</span>
      <span class="val ${sc}">${escHtml(ag.admStatus)}</span>
    </div>
    <div class="row">
      <span class="lbl">Plan</span>
      <span class="val ${statusClass(ag.planState)}">${escHtml(ag.planState)}</span>
    </div>
    <div class="row">
      <span class="lbl">Action</span>
      <span class="val">${escHtml(ag.currentAction)}${ag.currentTarget ? ' → ' + escHtml(ag.currentTarget) : ''}</span>
    </div>
    <div class="battery-bar" style="position:relative"><div class="battery-fill" style="width:${(batt*100).toFixed(0)}%;background:${bc}"></div><span style="position:absolute;right:4px;top:-1px;font-size:9px;color:${bc};line-height:1">${(batt*100).toFixed(0)}%</span></div>
    <button class="expand-btn" onclick="toggleDetails(this,'${escHtml(id)}');event.stopPropagation()">
      ${isExpanded ? '▲ 收起' : '▼ 详情'}
    </button>
    <div class="card-details${isExpanded ? ' open' : ''}">
      <div class="row"><span class="lbl">任务</span><span class="val">${escHtml(ag.missionDesc || '—')}</span></div>
      <div class="row"><span class="lbl">步骤</span><span class="val">${escHtml(ag.currentStep || '—')}</span></div>
      <div class="row"><span class="lbl">位置</span><span class="val">${ag.position?.map(v=>v.toFixed(1)).join(', ') ?? '—'}</span></div>
      <div class="row"><span class="lbl">电量</span><span class="val" style="color:${bc}">${(batt*100).toFixed(1)}%</span></div>
      <div class="row"><span class="lbl">附近</span><span class="val">${escHtml((ag.nearbyAgentIds||[]).join(', ') || '—')}</span></div>
      <div class="row"><span class="lbl">敌方</span><span class="val" style="color:var(--red)">${escHtml((ag.enemyAgentIds||[]).join(', ') || '—')}</span></div>
      ${buildPerceptionBlock(ag)}
      ${teammates.length > 0 ? `<div class="row" style="flex-wrap:wrap;gap:2px"><span class="lbl">队友</span>${teammateChips}</div>` : ''}
      ${buildCtxBlock(ag)}
    </div>`;
}

// 约束类型颜色
const CTYPE_COLORS = { C1: '#58a6ff', C2: '#3fb950', C3: '#d29922',
                       Assignment: '#58a6ff', Completion: '#3fb950', Coupling: '#d29922' };
function ctypeColor(cType) { return CTYPE_COLORS[cType] || '#8b949e'; }

function buildConstraintsHtml(constraints) {
  if (!constraints || constraints.length === 0) return '';
  const rows = constraints.map(c => {
    const col = ctypeColor(c.cType);
    // 各类型专属字段
    let extra = '';
    const ct = (c.cType || '').toUpperCase();
    if (ct === 'C1' || ct === 'ASSIGNMENT') {
      const parts = [];
      if (c.subject)      parts.push(`subject=<b>${escHtml(c.subject)}</b>`);
      if (c.targetObject) parts.push(`target=<b>${escHtml(c.targetObject)}</b>`);
      if (c.exclusive)    parts.push(`<span style="color:var(--red)">exclusive</span>`);
      extra = parts.join(' &nbsp; ');
    } else if (ct === 'C2' || ct === 'COMPLETION') {
      const parts = [];
      if (c.condition) parts.push(`cond: ${escHtml(c.condition)}`);
      if (c.syncWith && c.syncWith.length > 0)
        parts.push(`syncWith: [${c.syncWith.map(escHtml).join(', ')}]`);
      extra = parts.join(' &nbsp; ');
    } else if (ct === 'C3' || ct === 'COUPLING') {
      const signStr = c.sign === 1
        ? `<span style="color:var(--green)">sign=+1 (前置等待)</span>`
        : c.sign === -1
        ? `<span style="color:var(--orange)">sign=-1 (互斥)</span>`
        : `sign=${c.sign}`;
      const parts = [signStr];
      if (c.watchAgent) parts.push(`watch=<b>${escHtml(c.watchAgent)}</b>`);
      if (c.reactTo)    parts.push(`react=${escHtml(c.reactTo)}`);
      extra = parts.join(' &nbsp; ');
    }
    const chanBadge = c.channel
      ? `<span style="font-size:9px;padding:0 3px;border:1px solid var(--border);border-radius:2px;color:var(--muted)">${escHtml(c.channel)}</span>`
      : '';
    return `<div style="padding:3px 0;border-bottom:1px solid rgba(33,38,45,0.6);display:flex;flex-wrap:wrap;gap:4px;align-items:baseline">
      <span style="background:${col}22;color:${col};padding:0 4px;border-radius:3px;font-size:9px;font-weight:bold;flex-shrink:0">${escHtml(c.cType)}</span>
      <span style="color:var(--muted);font-size:9px;flex-shrink:0">${escHtml(c.constraintId)}</span>
      ${chanBadge}
      <span style="font-size:10px;flex:1">${extra}</span>
    </div>`;
  }).join('');
  return `<div style="margin-top:4px"><div style="color:var(--muted);font-size:9px;margin-bottom:2px">步骤约束 (${constraints.length})</div>${rows}</div>`;
}

// 节点类型对应的图标和颜色
const NODE_TYPE_STYLE = {
  Tree:              { icon: '🌳', color: '#3fb950' },
  Pedestrian:        { icon: '🚶', color: '#d29922' },
  Vehicle:           { icon: '🚗', color: '#58a6ff' },
  ResourcePoint:     { icon: '📦', color: '#f0883e' },
  TemporaryObstacle: { icon: '🚧', color: '#8b949e' },
  Agent:             { icon: '🤖', color: '#bc8cff' },
};
function nodeStyle(t) { return NODE_TYPE_STYLE[t] || { icon: '❓', color: '#8b949e' }; }

function buildPerceptionBlock(ag) {
  const objs = ag.detectedObjects;
  if (!objs || objs.length === 0)
    return '<div class="row"><span class="lbl">感知</span><span class="val" style="color:#8b949e">无检测物体</span></div>';

  // 按类型分组统计
  const groups = {};
  objs.forEach(o => {
    const t = o.nodeType || 'Unknown';
    if (!groups[t]) groups[t] = [];
    groups[t].push(o);
  });

  let html = '<div class="row" style="flex-direction:column;align-items:flex-start;gap:2px">' +
    '<span class="lbl">感知物体 (' + objs.length + ')</span>';
  for (const [type, items] of Object.entries(groups)) {
    const s = nodeStyle(type);
    const closest = items.reduce((a, b) => a.distance < b.distance ? a : b);
    html += `<div style="font-size:11px;padding-left:8px">` +
      `<span style="color:${s.color}">${s.icon} ${escHtml(type)}</span> ×${items.length}` +
      ` <span style="color:#8b949e;font-size:10px">最近 ${closest.distance.toFixed(1)}m</span></div>`;
  }
  html += '</div>';
  return html;
}

function buildCtxBlock(ag) {
  if (!ag.msnId && !ag.stepId && !ag.stepText) return '';

  const aq = ag.actionQueue || [];
  const idx = ag.currentActionIdx ?? 0;
  // 动作队列：当前正在执行的高亮，已完成的暗色，待执行的橙色
  const aqHtml = aq.map((t, i) => {
    let style = '';
    if (i < idx)       style = 'color:var(--muted);text-decoration:line-through';
    else if (i === idx) style = 'color:var(--green);font-weight:bold';
    else                style = 'color:var(--orange)';
    return `<div class="ctx-list-item" style="${style}">${i}. ${escHtml(t)}</div>`;
  }).join('');

  const execHtml = (ag.executedActions || []).map((s, i) =>
    `<div class="ctx-list-item">${i+1}. ${escHtml(s)}</div>`).join('');

  const scHtml = buildConstraintsHtml(ag.stepConstraints || []);

  return `<div class="ctx-block">
    <div class="ctx-block-title">执行上下文（ctx）</div>
    <div class="row"><span class="lbl">任务ID</span><span class="val">${escHtml(ag.msnId || '—')}</span></div>
    <div class="row"><span class="lbl">步骤ID</span><span class="val">${escHtml(ag.stepId || '—')}</span></div>
    <div class="row"><span class="lbl">步骤文本</span><span class="val">${escHtml(ag.stepText || '—')}</span></div>
    <div class="row"><span class="lbl">ctx状态</span><span class="val">${escHtml(ag.ctxStatus || '—')}</span></div>
    <div class="row"><span class="lbl">迭代次数</span><span class="val">${ag.iterationCount ?? 0}</span></div>
    <div class="row"><span class="lbl">当前位置</span><span class="val">${escHtml(ag.currentLocationName || '—')}</span></div>
    <div class="row"><span class="lbl">滚动模式</span><span class="val">${ag.isRollingMode ? '是' : '否'}</span></div>
    ${scHtml}
    ${aqHtml ? `<div style="margin-top:3px;color:var(--muted);font-size:9px">动作队列 [idx=${idx}]</div>${aqHtml}` : ''}
    ${execHtml ? `<div style="margin-top:3px;color:var(--muted);font-size:9px">已执行摘要 (${(ag.executedActions||[]).length})</div>${execHtml}` : ''}
  </div>`;
}

function toggleDetails(btn, agentId) {
  if (expandedSet.has(agentId)) {
    expandedSet.delete(agentId);
  } else {
    expandedSet.add(agentId);
  }
  // Re-render just this card
  const card = document.querySelector(`.agent-card[data-id="${CSS.escape(agentId)}"]`);
  const ag = agents.find(a => a.agentId === agentId);
  if (card && ag) updateAgentCard(card, ag);
}

// ══════════════════════════════════════════════════════════════════════════════
// Communications
// ══════════════════════════════════════════════════════════════════════════════
function setMsgFilter(f, btn) {
  msgFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Full rebuild on filter change
  renderedMsgKeys.clear();
  document.getElementById('comms-list').innerHTML = '';
  renderComms();
}

function renderComms() {
  const list = document.getElementById('comms-list');
  const filtered = msgFilter ? messages.filter(m => m.type === msgFilter) : messages;

  let newCount = 0;
  for (const msg of filtered) {
    const key = `${msg.timestamp}-${msg.sender}-${msg.type}`;
    if (renderedMsgKeys.has(key)) continue;
    renderedMsgKeys.add(key);

    const col = MSG_COLORS[msg.type] || '#8b949e';
    const el = document.createElement('div');
    el.className = 'msg-entry';
    el.innerHTML = `
      <span class="msg-time">${formatTime(msg.timestamp)}</span>
      <span class="msg-type-tag" style="background:${col}22;color:${col}">${escHtml(msg.type)}</span>
      <span class="msg-route">${escHtml(msg.sender)}→${escHtml(msg.receiver)}</span>
      <span class="msg-content" onclick="this.classList.toggle('expanded')" title="${escHtml(msg.content)}">${escHtml(msg.content)}</span>`;
    list.insertBefore(el, list.firstChild);
    newCount++;
  }

  // Trim to 200 entries
  while (list.children.length > 200) {
    list.removeChild(list.lastChild);
  }
  // Trim renderedMsgKeys to avoid unbounded growth
  if (renderedMsgKeys.size > 400) {
    const arr = [...renderedMsgKeys];
    renderedMsgKeys = new Set(arr.slice(arr.length - 200));
  }

  // Spawn arcs for new messages
  if (newCount > 0) spawnArcs(filtered.slice(-newCount));
}

function spawnArcs(newMsgs) {
  const now = performance.now() / 1000;
  for (const msg of newMsgs) {
    const sender = agents.find(a => a.agentId === msg.sender);
    if (!sender) continue;
    const [x1, y1] = worldToCanvas(sender.position[0], sender.position[2]);
    const col = MSG_COLORS[msg.type] || '#8b949e';

    if (!msg.receiver || msg.receiver === '—') {
      activeArcs.push({ x1, y1, x2: x1, y2: y1, color: col, startTime: now, duration: 0.8, isBroadcast: true, broadcastR: 30 });
    } else {
      const recv = agents.find(a => a.agentId === msg.receiver);
      if (recv) {
        const [x2, y2] = worldToCanvas(recv.position[0], recv.position[2]);
        activeArcs.push({ x1, y1, x2, y2, color: col, startTime: now, duration: 0.6, isBroadcast: false });
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// LLM Logs
// ══════════════════════════════════════════════════════════════════════════════
async function fetchLlmLogs() {
  try {
    const res = await fetch('/api/llm-logs');
    llmLogs = await res.json();
    updateLlmAgentFilter();
    updateLlmTagFilter();
    renderLlmLogs();
  } catch(e) {
    console.warn('fetchLlmLogs failed', e);
  }
}

function updateLlmAgentFilter() {
  const sel = document.getElementById('llm-agent-filter');
  const cur = sel.value;
  const ids = [...new Set(llmLogs.map(e => e.agentId))].sort();
  sel.innerHTML = '<option value="">全部</option>' + ids.map(id => `<option value="${escHtml(id)}">${escHtml(id)}</option>`).join('');
  if (ids.includes(cur)) sel.value = cur;
}

function updateLlmTagFilter() {
  const sel = document.getElementById('llm-tag-filter');
  const cur = sel.value;
  const tags = [...new Set(llmLogs.map(e => e.tag).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">全部</option>' + tags.map(t => `<option value="${escHtml(t)}">${escHtml(t)}</option>`).join('');
  if (tags.includes(cur)) sel.value = cur;
}

function renderLlmLogs() {
  const agentFilter = document.getElementById('llm-agent-filter').value;
  const typeFilter  = document.getElementById('llm-type-filter').value;
  const tagFilter   = document.getElementById('llm-tag-filter').value;

  let filtered = llmLogs;
  if (agentFilter) filtered = filtered.filter(e => e.agentId === agentFilter);
  if (typeFilter)  filtered = filtered.filter(e => e.type === typeFilter);
  if (tagFilter)   filtered = filtered.filter(e => e.tag === tagFilter);

  const list = document.getElementById('llm-list');
  list.innerHTML = '';

  const typeColors = { send: '#58a6ff', receive: '#3fb950', error: '#f85149' };

  for (let i = filtered.length - 1; i >= 0; i--) {
    const e = filtered[i];
    const col = typeColors[e.type] || '#8b949e';
    // Preview: preserve newlines as spaces, first 80 chars
    const preview = (e.content || '').slice(0, 80).replace(/\n/g, ' ');
    const tagCol  = llmTagColor(e.tag);
    const tagHtml = e.tag
      ? `<span class="llm-tag" style="background:${tagCol}22;color:${tagCol}">${escHtml(e.tag)}</span>`
      : '';

    const entry = document.createElement('div');
    entry.className = 'llm-entry';

    const hdr = document.createElement('div');
    hdr.className = 'llm-entry-header';
    hdr.innerHTML = `
      <span class="llm-type-tag" style="background:${col}22;color:${col}">${escHtml(e.type)}</span>
      <span class="llm-agent">${escHtml(e.agentId)}</span>
      ${tagHtml}
      <span class="llm-model">${escHtml(e.model || '')}</span>
      <span class="llm-ts">${escHtml(e.timestamp || '')}</span>
      <span class="llm-preview">${escHtml(preview)}</span>`;

    const body = document.createElement('div');
    body.className = 'llm-body';
    body.textContent = e.content || '';

    hdr.onclick = () => body.classList.toggle('open');
    entry.appendChild(hdr);
    entry.appendChild(body);
    list.appendChild(entry);
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:16px;color:var(--muted);text-align:center">暂无日志（切换到此标签时自动刷新）</div>';
  }
}
