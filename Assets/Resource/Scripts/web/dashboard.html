// Whiteboard
// ══════════════════════════════════════════════════════════════════════════════
async function fetchWhiteboard() {
  try {
    const res = await fetch('/api/whiteboard');
    whiteboardData = await res.json();
    updateWbGroupFilter();
    renderWhiteboard();
  } catch(e) {
    console.warn('fetchWhiteboard failed', e);
  }
}

function updateWbGroupFilter() {
  const sel = document.getElementById('wb-group-filter');
  const cur = sel.value;
  const entries = whiteboardData.entries || [];
  const groups = [...new Set(entries.map(e => e.groupId))].sort();
  sel.innerHTML = '<option value="">全部</option>' + groups.map(g =>
    `<option value="${escHtml(g)}">${escHtml(g)}</option>`).join('');
  if (groups.includes(cur)) sel.value = cur;
}

function renderWhiteboard() {
  const body = document.getElementById('wb-body');
  const groupFilter = document.getElementById('wb-group-filter').value;
  const entries = (whiteboardData.entries || []).filter(e => !groupFilter || e.groupId === groupFilter);
  const history = (whiteboardData.history || []).filter(e => !groupFilter || e.groupId === groupFilter);

  // Group entries by groupId
  const byGroup = {};
  for (const e of entries) {
    if (!byGroup[e.groupId]) byGroup[e.groupId] = [];
    byGroup[e.groupId].push(e);
  }

  let html = '';

  // Current state section
  html += '<div class="wb-section"><div class="wb-section-title">当前状态</div>';
  if (Object.keys(byGroup).length === 0) {
    html += '<div style="color:var(--muted);font-size:11px;padding:8px">暂无白板数据</div>';
  } else {
    for (const [gid, ents] of Object.entries(byGroup)) {
      html += `<div class="wb-group">
        <div class="wb-group-header">Group: ${escHtml(gid)}</div>
        <table class="wb-table">
          <thead><tr>
            <th>Agent</th><th>约束ID</th><th>类型</th><th>状态</th><th>进度</th><th>时间</th>
          </tr></thead>
          <tbody>`;
      for (const e of ents) {
        const tc = WB_TYPE_COLORS[e.entryType] || '#8b949e';
        html += `<tr>
          <td style="color:var(--blue)">${escHtml(e.agentId)}</td>
          <td style="color:var(--muted)">${escHtml(e.constraintId)}</td>
          <td><span class="wb-entry-type" style="background:${tc}22;color:${tc}">${escHtml(e.entryType)}</span></td>
          <td style="color:${e.status===1?'var(--green)':'var(--muted)'}">${e.status===1?'✓':'○'}</td>
          <td>${escHtml(e.progress || '—')}</td>
          <td style="color:var(--muted)">${formatTime(e.timestamp)}</td>
        </tr>`;
      }
      html += '</tbody></table></div>';
    }
  }
  html += '</div>';

  // Write history section
  const recentHistory = history.slice(-50).reverse();
  html += '<div class="wb-section"><div class="wb-section-title">写入历史（最近 50 条）</div>';
  if (recentHistory.length === 0) {
    html += '<div style="color:var(--muted);font-size:11px;padding:8px">暂无写入记录</div>';
  } else {
    for (const r of recentHistory) {
      const tc = WB_TYPE_COLORS[r.entryType] || '#8b949e';
      html += `<div class="wb-history-item">
        <span class="wb-history-time">${formatTime(r.timestamp)}</span>
        <span style="color:var(--blue)">${escHtml(r.agentId)}</span>
        <span style="color:var(--muted)">[${escHtml(r.groupId)}]</span>
        <span class="wb-entry-type" style="background:${tc}22;color:${tc}">${escHtml(r.entryType)}</span>
        <span style="color:var(--muted)">${escHtml(r.constraintId)}</span>
        ${r.progress ? `<span style="color:var(--text)">${escHtml(r.progress)}</span>` : ''}
      </div>`;
    }
  }
  html += '</div>';

  body.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
// Incidents / MAD Debate
// ══════════════════════════════════════════════════════════════════════════════
let incidentsData = [];

async function fetchIncidents() {
  try {
    const res = await fetch('/api/incidents');
    incidentsData = await res.json() || [];
    renderIncidents();
    // Update badge
    const debating = incidentsData.filter(i => i.status === 'Debating').length;
    const badge = document.getElementById('incident-badge');
    if (debating > 0) {
      badge.textContent = debating;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  } catch(e) {
    console.warn('fetchIncidents failed', e);
  }
}

function renderIncidents() {
  const body         = document.getElementById('inc-body');
  const statusFilter = document.getElementById('inc-status-filter').value;
  const critFilter   = document.getElementById('inc-crit-filter').value;

  let data = incidentsData;
  if (statusFilter) data = data.filter(i => i.status === statusFilter);
  if (critFilter === 'critical') data = data.filter(i => i.isCritical);
  if (critFilter === 'normal')   data = data.filter(i => !i.isCritical);

  if (!data || data.length === 0) {
    body.innerHTML = '<div class="inc-empty">暂无 MAD 辩论事件</div>';
    return;
  }

  // Sort: Debating first, then by startedAt desc
  data = [...data].sort((a, b) => {
    const order = { Debating: 0, Resolved: 1 };
    const od = (order[a.status] ?? 9) - (order[b.status] ?? 9);
    if (od !== 0) return od;
    return (b.startedAt || 0) - (a.startedAt || 0);
  });

  let html = '';
  for (const inc of data) {
    const opinions = inc.opinions || [];
    const rounds   = [...new Set(opinions.map(o => o.round))].sort((a, b) => a - b);
    const critCls  = inc.isCritical ? 'crit-true' : 'crit-false';
    const critTxt  = inc.isCritical ? 'Critical'  : 'Normal';

    html += `<div class="inc-card">
      <div class="inc-card-header">
        <span class="inc-id">${escHtml(inc.incidentId || '—')}</span>
        <span class="crit-badge ${critCls}">${critTxt}</span>
        <span class="status-badge status-${escHtml(inc.status||'')}">${escHtml(inc.status||'?')}</span>
        <span class="inc-desc" title="${escHtml(inc.description||'')}">${escHtml(inc.description||'')}</span>
      </div>
      <div class="inc-meta">
        <span><span style="color:var(--muted)">类型</span> <span style="color:var(--blue)">${escHtml(inc.incidentType||'?')}</span></span>
        <span><span style="color:var(--muted)">组</span> ${escHtml(inc.groupId||'?')}</span>
        <span><span style="color:var(--muted)">上报者</span> ${escHtml(inc.reporterId||'?')}</span>
        <span><span style="color:var(--muted)">开始于</span> ${formatTime(inc.startedAt||0)}</span>
        ${inc.resolvedAt ? `<span><span style="color:var(--muted)">解决于</span> ${formatTime(inc.resolvedAt)}</span>` : ''}
      </div>
      ${inc.context ? `<div class="inc-context">${escHtml(inc.context)}</div>` : ''}`;

    // Member opinions grouped by round
    if (opinions.length > 0) {
      html += '<div class="inc-rounds">';
      for (const round of rounds) {
        const roundOps = opinions.filter(o => o.round === round);
        html += `<div class="inc-round-header">Round ${round}</div>`;
        for (const op of roundOps) {
          const confPct   = Math.round((op.confidence || 0) * 100);
          const confColor = op.confidence > 0.7 ? '#3fb950' : op.confidence > 0.4 ? '#d29922' : '#f85149';
          html += `<div class="debate-entry">
            <div class="de-body">
              <div class="de-author">${escHtml(op.agentId||'?')}</div>
              <div class="de-content">${escHtml(op.recommendation||'')}</div>
              <div class="de-conf">
                <div class="conf-bar"><div class="conf-fill" style="width:${confPct}%;background:${confColor}"></div></div>
                <span class="conf-label">${confPct}%</span>
              </div>
            </div>
          </div>`;
        }
      }
      html += '</div>';
    } else {
      html += '<div style="padding:6px 10px;font-size:10px;color:var(--muted)">等待成员意见响应…</div>';
    }

    // Decision (Resolved)
    if (inc.status === 'Resolved' && inc.decision) {
      const dec  = inc.decision;
      const dirs = dec.directives || [];
      const dirHtml = dirs.map(d => `
        <div class="inc-directive">
          <span class="inc-dir-agent">${escHtml(d.agentId||'?')}</span>
          <span class="inc-dir-module">[${escHtml(d.targetModule||'?')}]</span>
          <span class="inc-dir-instr">${escHtml(d.instruction||'')}</span>
        </div>`).join('');
      html += `<div class="inc-resolution">
        <div class="inc-res-title">✓ 仲裁决策</div>
        <div class="inc-res-body">${escHtml(dec.summary||'')}</div>
        ${dirHtml}
      </div>`;
    }

    html += '</div>'; // .inc-card
  }

  body.innerHTML = html;
}

function setModelPreset(model) {
  document.getElementById('model-input').value = model;
}

async function submitModel() {
  const model = document.getElementById('model-input').value.trim();
  const statusEl = document.getElementById('model-status');
  if (!model) { setStatus(statusEl, '请输入模型名称', false); return; }
  try {
    const res = await fetch('/api/model', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model })
    });
    const j = await res.json();
    setStatus(statusEl, j.ok ? `已切换到 ${model}` : '切换失败', j.ok);
  } catch(e) {
    setStatus(statusEl, '请求失败: ' + e.message, false);
  }
}

async function submitTask() {
  const mission = document.getElementById('task-input').value.trim();
  const agentCount = parseInt(document.getElementById('agent-count-input').value) || 1;
  const statusEl = document.getElementById('task-status');
  if (!mission) { setStatus(statusEl, '请输入任务描述', false); return; }
  try {
    const res = await fetch('/api/task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mission, agentCount })
    });
    const j = await res.json();
    setStatus(statusEl, j.ok ? '任务已提交' : '提交失败', j.ok);
  } catch(e) {
    setStatus(statusEl, '请求失败: ' + e.message, false);
  }
}

function setStatus(el, msg, ok) {
  el.textContent = msg;
  el.className = 'ctrl-status ' + (ok ? 'ok' : 'err');
  setTimeout(() => { el.textContent = ''; el.className = 'ctrl-status'; }, 4000);
}

function statusColor(s) {
  if (!s) return 'var(--muted)';
  const l = s.toLowerCase();
  if (l === 'idle' || l === 'done') return 'var(--green)';
  if (l === 'active' || l === 'running') return 'var(--blue)';
  if (['thinking','interpreting','negotiating','replanning',
       'parsing','slotgen','slotpick','stepgen','grouping'].includes(l)) return 'var(--orange)';
  if (l === 'failed' || l === 'error') return 'var(--red)';
  return 'var(--muted)';
}

function renderDebug() {
  const pane = document.getElementById('tab-debug');
  const teams = {};
  for (const ag of agents) {
    const t = ag.teamId ?? 0;
    if (!teams[t]) teams[t] = 0;
    teams[t]++;
  }
  const teamRows = Object.entries(teams).map(([t, cnt]) =>
    `<div class="debug-row">
      <span class="debug-lbl" style="color:${teamColor(Number(t))}">Team ${t}</span>
      <span>${cnt} 成员</span>
    </div>`).join('');

  const planStates = {};
  for (const ag of agents) {
    const s = ag.planState || 'N/A';
    planStates[s] = (planStates[s] || 0) + 1;
  }
  const totalAgents = agents.length || 1;
  const planRows = Object.entries(planStates).map(([s, cnt]) => {
    const pct = (cnt / totalAgents * 100).toFixed(0);
    return `<div class="bar-container">
      <div class="bar-label">
        <span style="color:${statusColor(s)}">${escHtml(s)}</span>
        <span>${cnt} (${pct}%)</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${statusColor(s)}"></div></div>
    </div>`;
  }).join('');

  // ADM state distribution
  const admStates = {};
  for (const ag of agents) {
    const s = ag.admStatus || 'N/A';
    admStates[s] = (admStates[s] || 0) + 1;
  }
  const admRows = Object.entries(admStates).map(([s, cnt]) => {
    const pct = (cnt / totalAgents * 100).toFixed(0);
    return `<div class="bar-container">
      <div class="bar-label">
        <span style="color:${statusColor(s)}">${escHtml(s)}</span>
        <span>${cnt} (${pct}%)</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${statusColor(s)}"></div></div>

  // Current action distribution
  const actionCounts = {};
  for (const ag of agents) {
    const a = ag.currentAction || 'None';
    actionCounts[a] = (actionCounts[a] || 0) + 1;

  const actionRows = Object.entries(actionCounts).map(([a, cnt]) =>
    `<div class="debug-row"><span class="debug-lbl">${escHtml(a)}</span><span>${cnt}</span></div>`
  ).join('');

  // Map node statistics by kind
  const kindCounts = {};
  for (const f of (mapMeta.features || [])) {
    const k = f.kind || 'unknown';
    kindCounts[k] = (kindCounts[k] || 0) + 1;
  }
  const kindRows = Object.entries(kindCounts).map(([k, cnt]) => {
    const sty = FEATURE_STYLES[k.toLowerCase()] || FEATURE_STYLES.default;
    return `<div class="debug-row">
      <span class="debug-lbl" style="color:${sty.stroke}">${escHtml(k)}</span>
      <span>${cnt}</span>
    </div>`;
  }).join('');

  const llmSendCount = llmLogs.filter(e => e.type === 'send').length;
  const llmRecvCount = llmLogs.filter(e => e.type === 'receive').length;
  const llmErrCount  = llmLogs.filter(e => e.type === 'error').length;

  const pingColor = pingMs < 100 ? 'var(--green)' : pingMs < 300 ? 'var(--orange)' : 'var(--red)';

  // Recent events per agent
  const recentEventsHtml = agents.filter(ag => ag.recentEvents && ag.recentEvents.length > 0).map(ag => {
    const col = teamColor(ag.teamId);
    const evts = ag.recentEvents.slice(-3).map(ev => `<div style="color:var(--muted);font-size:10px;margin:1px 0">${escHtml(ev)}</div>`).join('');
    return `<div style="margin-bottom:6px"><span style="color:${col};font-size:10px">${escHtml(ag.agentId)}</span>${evts}</div>`;
  }).join('');

  pane.innerHTML = `

      <div class="debug-title">连接状态</div>
      <div class="debug-row"><span class="debug-lbl">延迟</span><span style="color:${pingColor}">${pingMs} ms</span></div>

        const col = teamColor(ag.teamId);
        return `<div class="bar-container">
          <div class="bar-label">
            <span style="color:${col}">${escHtml(ag.agentId)}</span>
            <span style="color:${bc}">${(batt*100).toFixed(0)}%</span>
          </div>
          <div class="bar"><div class="bar-fill" style="width:${(batt*100).toFixed(0)}%;background:${bc}"></div></div>
        </div>`;
      }).join('')}
    </div>
    ${recentEventsHtml ? `<div class="debug-section">
      <div class="debug-title">近期事件</div>
      ${recentEventsHtml}
    </div>` : ''}
  `;
}

// Data polling
// ══════════════════════════════════════════════════════════════════════════════
async function poll() {
  const t0 = performance.now();
  try {
    const [stateRes, msgsRes, histRes] = await Promise.all([
      fetch('/api/state'),
      fetch('/api/messages'),
      fetch('/api/history'),
    ]);
    agents     = await stateRes.json();
    messages   = await msgsRes.json();
    posHistory = await histRes.json();
    pingMs     = Math.round(performance.now() - t0);

    document.getElementById('conn-badge').textContent = '已连接';
    document.getElementById('conn-badge').className   = 'badge ok';
    document.getElementById('hdr-agents').textContent = `${agents.length} Agents`;
    document.getElementById('hdr-msgs').textContent   = `${messages.length} 消息`;
    const pingColor = pingMs < 100 ? 'var(--green)' : pingMs < 300 ? 'var(--orange)' : 'var(--red)';
    const pingEl = document.getElementById('hdr-ping');
    pingEl.textContent = pingMs + ' ms';
    pingEl.style.color = pingColor;

    renderAgents();
    renderComms();
    if (currentTab === 'debug') renderDebug();
    if (currentTab === 'whiteboard') fetchWhiteboard();
    if (currentTab === 'incidents') fetchIncidents();
    if (currentTab === 'emergence') fetchEmergence();
    if (currentTab === 'memory') {
      if (memSubTab === 'policies') fetchPolicies();
      else fetchMemory();
    }
    // 运动事件独立拉取，不影响主 poll 失败判断
    fetchMotionEvents();
  } catch(e) {
    document.getElementById('conn-badge').textContent = '连接失败';
    document.getElementById('conn-badge').className   = 'badge err';
    document.getElementById('hdr-ping').textContent   = '—';
  }
  pollTimer = setTimeout(poll, pollInterval);
}

async function fetchMapData() {
  try {
    const [mapRes, gridRes] = await Promise.all([
      fetch('/api/map'),
      fetch('/api/gridmap'),
    ]);
    const m = await mapRes.json();
    if (m && m.cellSize) { mapMeta = m; }
    const g = await gridRes.json();
    if (g && g.cells) { gridmap = g; bgReady = false; buildBgCanvas(); }
    // Build map legend
    buildMapLegend();
  } catch(e) {
    console.warn('fetchMapData failed', e);
  }
}

function buildMapLegend() {
  const body = document.getElementById('map-legend-body');
  if (!body) return;
  const kinds = [...new Set((mapMeta.features || []).map(f => (f.kind||'').toLowerCase()))].filter(Boolean);
  body.innerHTML = kinds.map(k => {
    const sty = FEATURE_STYLES[k] || FEATURE_STYLES.default;
    return `<div style="display:flex;align-items:center;gap:5px">
      <div style="width:10px;height:10px;border-radius:50%;background:${sty.fill};border:1.5px solid ${sty.stroke};flex-shrink:0"></div>
      <span style="color:${sty.stroke}">${k}</span>
    </div>`;
  }).join('');
}

function changeInterval(v) {
  pollInterval = parseInt(v);
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  poll();
}

// Divider drag
// ══════════════════════════════════════════════════════════════════════════════
(function() {
  const divider = document.getElementById('divider');
  const left    = document.getElementById('left-panel');
  let dragging  = false;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    divider.classList.add('dragging');
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const main  = document.getElementById('main');
    const rect  = main.getBoundingClientRect();
    const frac  = Math.max(0.2, Math.min(0.8, (e.clientX - rect.left) / rect.width));
    left.style.flex = `0 0 ${(frac * 100).toFixed(1)}%`;
    bgReady = false;
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    divider.classList.remove('dragging');
  });
})();

// 运动事件气泡
// ══════════════════════════════════════════════════════════════════════════════

async function fetchMotionEvents() {
  try {
    const res = await fetch('/api/motion-events');
    const data = await res.json(); // { agentId: MotionEventDto[] }
    mergeBubbles(data);
  } catch(e) { /* silent — 不影响主监控 */ }
}

function mergeBubbles(newEvents) {
  const now = performance.now() / 1000;
  for (const [agentId, evts] of Object.entries(newEvents || {})) {
    if (!evts || !evts.length) continue;
    if (!bubbleMap.has(agentId)) bubbleMap.set(agentId, []);
    const existing = bubbleMap.get(agentId);
    for (const ev of evts) {
      const key = `${ev.timestamp}-${ev.eventType}`;
      if (existing.some(b => b.key === key)) continue;
      existing.unshift({ key, msg: ev.message, eventType: ev.eventType, shownAt: now });
      while (existing.length > BUBBLE_MAX) existing.pop();
    }
  }
}

/** 圆角矩形路径（兼容不支持 ctx.roundRect 的环境） */
function bubbleRoundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.arcTo(x + w, y,     x + w, y + r,     r);
  c.lineTo(x + w, y + h - r);
  c.arcTo(x + w, y + h, x + w - r, y + h, r);
  c.lineTo(x + r, y + h);
  c.arcTo(x,     y + h, x,     y + h - r, r);
  c.lineTo(x,     y + r);
  c.arcTo(x,     y,     x + r, y,         r);
  c.closePath();
}

/** 在 zoom/pan 坐标系内绘制气泡（在 drawFrame 的 agents 循环后、ctx.restore() 前调用） */
function drawBubbles() {
  const now = performance.now() / 1000;

  for (const ag of agents) {
    const bubbles = bubbleMap.get(ag.agentId);
    if (!bubbles || !bubbles.length) continue;

    const [cx, cy] = worldToCanvas(ag.position[0], ag.position[2]);
    let yOffset = -(14 / zoomLevel);

    for (let i = 0; i < bubbles.length; i++) {
      const b   = bubbles[i];
      const age = now - b.shownAt;

      // 过期移除
      if (age > BUBBLE_SHOW + BUBBLE_FADE) { bubbles.splice(i--, 1); continue; }

      const alpha = age < BUBBLE_SHOW
        ? 1.0
        : 1.0 - (age - BUBBLE_SHOW) / BUBBLE_FADE;

      const col = BUBBLE_COLORS[b.eventType] || '#8b949e';
      const fs  = Math.max(7, 10 / zoomLevel);
      ctx.font  = `${fs}px monospace`;

      const textW = ctx.measureText(b.msg).width;
      const padX  = 6 / zoomLevel;
      const padY  = 3 / zoomLevel;
      const bw    = textW + padX * 2;
      const bh    = fs + padY * 2;

      // 防止气泡超出 canvas 右边界（基础坐标系）
      const canvasBaseW = canvas.width / zoomLevel;
      let bLeft = cx + 10 / zoomLevel;
      if (bLeft + bw > canvasBaseW - 4 / zoomLevel)
        bLeft = canvasBaseW - bw - 4 / zoomLevel;

      const bTop = cy + yOffset - bh;

      ctx.globalAlpha = alpha;

      // 连接线（agent 圆心 → 气泡左边中点）
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(bLeft, bTop + bh / 2);
      ctx.strokeStyle = col + '66';
      ctx.lineWidth   = 0.8 / zoomLevel;
      ctx.stroke();

      // 气泡背景
      ctx.fillStyle = 'rgba(22,27,34,0.92)';
      bubbleRoundRect(ctx, bLeft, bTop, bw, bh, 3 / zoomLevel);
      ctx.fill();

      // 气泡边框
      ctx.strokeStyle = col;
      ctx.lineWidth   = 0.8 / zoomLevel;
      bubbleRoundRect(ctx, bLeft, bTop, bw, bh, 3 / zoomLevel);
      ctx.stroke();

      // 文字
      ctx.fillStyle    = col;
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.msg, bLeft + padX, bTop + bh / 2);

      ctx.globalAlpha = 1;
      yOffset -= (bh + 3 / zoomLevel);
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// 记忆 / 反思洞察面板
// ══════════════════════════════════════════════════════════════════════════════

async function fetchMemory() {
  try {
    const res = await fetch('/api/memory');
    memoryData = await res.json(); // AgentMemoryPayload[]
    updateMemAgentFilter();
    renderMemory();
  } catch(e) {
    console.warn('[Memory] fetch failed', e);
  }
}

function updateMemAgentFilter() {
  const sel = document.getElementById('mem-agent-filter');
  if (!sel) return;
  const cur = sel.value;
  const ids = (memoryData || []).map(p => p.agentId).sort();
  sel.innerHTML = '<option value="">全部</option>' +
    ids.map(id => `<option value="${escHtml(id)}">${escHtml(id)}</option>`).join('');
  if (ids.includes(cur)) sel.value = cur;
}

function switchMemSub(sub) {
  memSubTab = sub;
  document.getElementById('mem-sub-memories')?.classList.toggle('active', sub === 'memories');
  document.getElementById('mem-sub-insights')?.classList.toggle('active', sub === 'insights');
  document.getElementById('mem-sub-policies')?.classList.toggle('active', sub === 'policies');
  // 持久化规律库面板与 mem-body 互斥显示
  const body   = document.getElementById('mem-body');
  const polPnl = document.getElementById('mem-policies-panel');
  if (body)   body.style.display   = sub === 'policies' ? 'none' : '';
  if (polPnl) polPnl.style.display = sub === 'policies' ? ''     : 'none';
  if (sub === 'policies') {
    fetchPolicies();
  } else {
    renderMemory();
  }
}

function renderMemory() {
  const body      = document.getElementById('mem-body');
  const countEl   = document.getElementById('mem-total-count');
  if (!body) return;

  const agentF   = document.getElementById('mem-agent-filter')?.value || '';
  const kindF    = document.getElementById('mem-kind-filter')?.value  || '';
  const procOnly = document.getElementById('mem-proc-only')?.checked  || false;

  const payloads = agentF
    ? (memoryData || []).filter(p => p.agentId === agentF)
    : (memoryData || []);

  if (memSubTab === 'memories') {
    renderMemoryList(body, payloads, kindF, procOnly, countEl);
  } else {
    renderInsightList(body, payloads, agentF, countEl);
  }
}

function renderMemoryList(body, payloads, kindF, procOnly, countEl) {
  const nowSec = Date.now() / 1000;
  let totalShown = 0, totalAll = 0;
  let html = '';

  for (const payload of payloads) {
    totalAll += payload.totalMemoryCount || 0;
    let mems = payload.memories || [];
    if (kindF)    mems = mems.filter(m => m.kind === kindF);
    if (procOnly) mems = mems.filter(m => m.isProceduralHint);
    if (!mems.length) continue;

    totalShown += mems.length;
    const col = teamColor(agents.find(a => a.agentId === payload.agentId)?.teamId ?? 0);

    html += `<div style="margin-bottom:10px">
      <div style="color:${col};font-size:11px;font-weight:bold;margin-bottom:4px;
                  padding:3px 7px;background:${col}18;border-radius:3px">
        ${escHtml(payload.agentId)}
        <span style="color:var(--muted);font-weight:normal;font-size:9px;margin-left:6px">
          显示 ${mems.length} / 总计 ${payload.totalMemoryCount} 条
        </span>
      </div>`;

    for (const m of mems) {
      const kindCls  = 'mem-kind-' + (m.kind || '').toLowerCase();
      const depthLbl = m.reflectionDepth === 2 ? 'L3' : m.reflectionDepth === 1 ? 'L2' : '';
      const impPct   = Math.round((m.importance || 0) * 100);
      const impColor = m.importance > 0.7 ? 'var(--red)' :
                       m.importance > 0.4 ? 'var(--orange)' : 'var(--blue)';
      const ageSec   = nowSec - (m.createdAtUnix || 0);
      const ageStr   = formatAgeSec(ageSec);

      // 详情内容行（仅非空字段）
      let detailRows = '';
      if (m.detail)       detailRows += memRow('详情', escHtml(m.detail));
      detailRows += memRow('重要性 / 置信度',
        `${(m.importance||0).toFixed(2)} &nbsp;/&nbsp; ${(m.confidence||0).toFixed(2)}`);
      detailRows += memRow('强度分 / 访问',
        `${(m.strengthScore||0).toFixed(2)} &nbsp;/&nbsp; ${m.accessCount||0} 次`);
      if (m.sourceModule) detailRows += memRow('来源模块', escHtml(m.sourceModule));
      if (m.missionId)    detailRows += memRow('任务 ID',   escHtml(m.missionId));
      if (m.targetRef)    detailRows += memRow('目标引用', escHtml(m.targetRef));
      if (m.outcome)      detailRows += memRow('结果',     escHtml(m.outcome));
      if (m.tags && m.tags.length)
        detailRows += memRow('标签',
          m.tags.map(t => `<span class="mem-tag-chip">${escHtml(t)}</span>`).join(''));

      html += `<div class="mem-card">
        <div class="mem-card-header">
          <span class="mem-kind-badge ${kindCls}">${escHtml(m.kind||'?')}</span>
          ${depthLbl ? `<span class="mem-depth-badge">${depthLbl}</span>` : ''}
          ${m.isProceduralHint ? '<span class="mem-proc-badge">🔧 程序性</span>' : ''}
          <span class="mem-status-badge mem-status-${escHtml(m.status||'')}">${escHtml(m.status||'')}</span>
          <span class="mem-age">${ageStr}</span>
        </div>
        <div class="mem-imp-bar" style="width:${impPct}%;background:${impColor}"></div>
        <div class="mem-summary">${escHtml(m.summary || '（无摘要）')}</div>
        <button class="expand-btn" onclick="toggleMemDetail(this)">▼ 详情</button>
        <div class="mem-detail">
          ${detailRows}
        </div>
      </div>`;
    }
    html += '</div>';
  }

  body.innerHTML = html ||
    '<div style="padding:24px;color:var(--muted);text-align:center">暂无记忆数据（等待 Agent 运行或刷新）</div>';
  if (countEl) countEl.textContent = `显示 ${totalShown} / 总 ${totalAll} 条`;
}

function memRow(lbl, val) {
  return `<div class="mem-detail-row">
    <span class="mem-detail-lbl">${lbl}</span>
    <span class="mem-detail-val">${val}</span>
  </div>`;
}

function renderInsightList(body, payloads, agentF, countEl) {
  const nowSec = Date.now() / 1000;
  let total = 0;
  let html  = '';

  for (const payload of payloads) {
    const ins = payload.insights || [];
    if (!ins.length) continue;
    total += ins.length;

    const col = teamColor(agents.find(a => a.agentId === payload.agentId)?.teamId ?? 0);
    html += `<div style="margin-bottom:10px">
      <div style="color:${col};font-size:11px;font-weight:bold;margin-bottom:4px;
                  padding:3px 7px;background:${col}18;border-radius:3px">
        ${escHtml(payload.agentId)}
        <span style="color:var(--muted);font-weight:normal;font-size:9px;margin-left:6px">${ins.length} 条洞察</span>
      </div>`;

    for (const i of ins) {
      const depthLbl   = i.insightDepth === 2 ? 'L3 抽象' : 'L2 推断';
      const depthColor = i.insightDepth === 2 ? 'var(--red)' : '#bc8cff';
      const confPct    = Math.round((i.confidence || 0) * 100);
      const confColor  = i.confidence > 0.7 ? 'var(--green)' :
                         i.confidence > 0.4 ? 'var(--orange)' : 'var(--red)';

      let ttlHtml = '';
      if (i.remainingSeconds < 0) {
        ttlHtml = '<span class="insight-never">永久有效</span>';
      } else if (i.remainingSeconds <= 0) {
        ttlHtml = '<span class="insight-expired">已过期</span>';
      } else {
        ttlHtml = `<span class="insight-ttl">剩 ${formatAgeSec(i.remainingSeconds)}</span>`;
      }

      html += `<div class="insight-card">
        <div class="insight-header">
          <span class="insight-depth" style="background:${depthColor}22;color:${depthColor};border:1px solid ${depthColor}55">${depthLbl}</span>
          <span class="insight-title">${escHtml(i.title || '（无标题）')}</span>
          ${ttlHtml}
        </div>
        <div class="insight-conf-bar">
          <div class="insight-conf-fill" style="width:${confPct}%;background:${confColor}"></div>
        </div>
        <div class="insight-field">
          <div class="insight-field-lbl">摘要</div>
          <div style="color:var(--text)">${escHtml(i.summary || '')}</div>
        </div>
        ${i.applyWhen ? `<div class="insight-field">
          <div class="insight-field-lbl">适用场景</div>
          <div style="color:var(--orange)">${escHtml(i.applyWhen)}</div>
        </div>` : ''}
        ${i.suggestedAdjustment ? `<div class="insight-field">
          <div class="insight-field-lbl">建议调整</div>
          <div style="color:var(--green)">${escHtml(i.suggestedAdjustment)}</div>
        </div>` : ''}
        ${i.tags && i.tags.length ? `<div style="margin-top:3px">${i.tags.map(t=>`<span class="mem-tag-chip">${escHtml(t)}</span>`).join('')}</div>` : ''}
        <div style="font-size:9px;color:var(--muted);margin-top:3px">
          置信度 ${confPct}%${i.missionId ? ' · 任务 ' + escHtml(i.missionId) : ''}
        </div>
      </div>`;
    }
    html += '</div>';
  }

  body.innerHTML = html ||
    '<div style="padding:24px;color:var(--muted);text-align:center">暂无反思洞察（L2/L3 反思触发后此处显示）</div>';
  if (countEl) countEl.textContent = `${total} 条洞察`;
}

// ══════════════════════════════════════════════════════════════════════════════
// 持久化规律库面板
// ══════════════════════════════════════════════════════════════════════════════

async function fetchPolicies() {
  try {
    const res = await fetch('/api/memory/policies');
    lastPoliciesData = await res.json();
    renderPolicies(lastPoliciesData);
  } catch(e) {
    console.warn('[Policies] fetch failed', e);
  }
}

function renderPolicies(data) {
  const search    = (document.getElementById('policy-search')?.value || '').toLowerCase();
  const tagFilter = document.getElementById('policy-tag-filter')?.value || '';

  const statsEl = document.getElementById('policy-stats');
  if (statsEl) statsEl.innerHTML =
    `Policy: ${data.policyCount} 条　Insight: ${data.insightCount} 条（全局去重，跨 run 持久化）` +
    (data.saveFilePath ? `<br><span style="color:var(--muted);font-size:9px;word-break:break-all">📁 ${escHtml(data.saveFilePath)}</span>` : '');

  // 更新标签下拉（保留当前选中）
  const allTags = new Set();
  (data.policies || []).forEach(p => (p.tags || []).forEach(t => allTags.add(t)));
  (data.insights || []).forEach(i => (i.tags || []).forEach(t => allTags.add(t)));
  const sel = document.getElementById('policy-tag-filter');
  if (sel) {
    const cur = sel.value;
    sel.innerHTML = '<option value="">全部标签</option>' +
      [...allTags].sort().map(t =>
        `<option value="${escHtml(t)}"${t === cur ? ' selected' : ''}>${escHtml(t)}</option>`).join('');
  }

  // ── Policy 过滤 + 渲染 ──
  const policies = (data.policies || []).filter(p => {
    const txt = ((p.summary || '') + (p.detail || '') + (p.tags || []).join(' ')).toLowerCase();
    return (!search || txt.includes(search)) && (!tagFilter || (p.tags || []).includes(tagFilter));
  });
  const pEl = document.getElementById('policy-list');
  if (pEl) {
    pEl.innerHTML = policies.length ? policies.map(p => {
      const confColor = p.confidence > 0.75 ? 'var(--green)' :
                        p.confidence > 0.45 ? 'var(--orange)' : 'var(--red)';
      const strPct = Math.round((p.strengthScore || 0) * 100);
      return `<div class="mem-card" style="border-left:2px solid #7c3aed">
        <div class="mem-card-header">
          <span class="mem-kind-badge mem-kind-policy">Policy</span>
          ${p.isProceduralHint ? '<span class="mem-proc-badge">🔧 程序性</span>' : ''}
          <span style="font-size:10px;color:${confColor}">置信 ${(p.confidence*100).toFixed(0)}%</span>
          <span style="font-size:10px;color:var(--muted);margin-left:4px">强度 ${strPct}%</span>
          <span style="font-size:10px;color:var(--muted);margin-left:4px">访问 ${p.accessCount||0} 次</span>
        </div>
        <div class="mem-imp-bar" style="width:${strPct}%;background:#7c3aed"></div>
        <div class="mem-summary">${escHtml(p.summary || '（无摘要）')}</div>
        ${(p.tags && p.tags.length) ? `<div style="margin-top:4px">${p.tags.map(t=>`<span class="mem-tag-chip">${escHtml(t)}</span>`).join('')}</div>` : ''}
        ${p.sourceModule ? `<div style="font-size:10px;color:var(--muted);margin-top:3px">来源: ${escHtml(p.sourceModule)}</div>` : ''}
      </div>`;
    }).join('')
    : '<div style="padding:16px;color:var(--muted);font-size:11px;text-align:center">暂无 Policy 规律（等待任务执行后提炼）</div>';
  }

  // ── Insight 过滤 + 渲染 ──
  const insights = (data.insights || []).filter(i => {
    const txt = ((i.title || '') + (i.summary || '') + (i.applyWhen || '') + (i.tags || []).join(' ')).toLowerCase();
    return (!search || txt.includes(search)) && (!tagFilter || (i.tags || []).includes(tagFilter));
  });
  const iEl = document.getElementById('persistent-insight-list');
  if (iEl) {
    iEl.innerHTML = insights.length ? insights.map(i => {
      const depthLbl   = i.insightDepth >= 2 ? 'L3 抽象' : 'L2 推断';
      const depthColor = i.insightDepth >= 2 ? 'var(--red)' : '#bc8cff';
      const confColor  = i.confidence > 0.75 ? 'var(--green)' :
                         i.confidence > 0.45 ? 'var(--orange)' : 'var(--red)';
      const confPct    = Math.round((i.confidence || 0) * 100);
      let ttlHtml = i.remainingSeconds < 0
        ? '<span class="insight-never">永久有效</span>'
        : i.remainingSeconds <= 0
          ? '<span class="insight-expired">已过期</span>'
          : `<span class="insight-ttl">剩 ${formatAgeSec(i.remainingSeconds)}</span>`;
      return `<div class="insight-card" style="border-left:2px solid ${depthColor}">
        <div class="insight-header">
          <span class="insight-depth" style="background:${depthColor}22;color:${depthColor};border:1px solid ${depthColor}55">${depthLbl}</span>
          <span class="insight-title">${escHtml(i.title || '（无标题）')}</span>
          ${ttlHtml}
        </div>
        <div class="insight-conf-bar">
          <div class="insight-conf-fill" style="width:${confPct}%;background:${confColor}"></div>
        </div>
        <div class="insight-field">
          <div class="insight-field-lbl">摘要</div>
          <div style="color:var(--text)">${escHtml(i.summary || '')}</div>
        </div>
        ${i.applyWhen ? `<div class="insight-field">
          <div class="insight-field-lbl">适用场景</div>
          <div style="color:var(--orange)">${escHtml(i.applyWhen)}</div>
        </div>` : ''}
        ${i.suggestedAdjustment ? `<div class="insight-field">
          <div class="insight-field-lbl">建议策略</div>
          <div style="color:var(--green)">${escHtml(i.suggestedAdjustment)}</div>
        </div>` : ''}
        ${(i.tags && i.tags.length) ? `<div style="margin-top:3px">${i.tags.map(t=>`<span class="mem-tag-chip">${escHtml(t)}</span>`).join('')}</div>` : ''}
        <div style="font-size:9px;color:var(--muted);margin-top:3px">
          置信度 ${confPct}%${i.missionId ? ' · 任务 ' + escHtml(i.missionId) : ''}
        </div>
      </div>`;
    }).join('')
    : '<div style="padding:16px;color:var(--muted);font-size:11px;text-align:center">暂无反思洞察（L2/L3 反思触发后此处显示）</div>';
  }
}

function toggleMemDetail(btn) {
  const d = btn.nextElementSibling;
  if (!d) return;
  const open = d.classList.toggle('open');
  btn.textContent = open ? '▲ 收起' : '▼ 详情';
}

function formatAgeSec(sec) {
  if (sec < 0) return '永久';
  if (sec < 60)    return Math.floor(sec) + '秒前';
  if (sec < 3600)  return Math.floor(sec / 60) + '分钟前';
  if (sec < 86400) return (sec / 3600).toFixed(1) + '小时前';
  return (sec / 86400).toFixed(1) + '天前';
}

// ══════════════════════════════════════════════════════════════════════════════
// 涌现模块面板
// ══════════════════════════════════════════════════════════════════════════════

let emergenceData = [];

async function fetchEmergence() {
  try {
    const res  = await fetch('/api/emergence');
    emergenceData = await res.json();
    renderEmergence();
  } catch(e) {
    console.warn('fetchEmergence failed', e);
  }
}

function renderEmergence() {
  const body   = document.getElementById('emer-body');
  const filter = document.getElementById('emer-agent-filter');
  if (!body) return;

  // 同步 agent 过滤器选项
  const agentIds = [...new Set(emergenceData.map(e => e.agentId))].sort();
  const selected = filter ? filter.value : '';
  if (filter) {
    const opts = ['<option value="">全部</option>',
      ...agentIds.map(id => `<option value="${escHtml(id)}" ${id===selected?'selected':''}>${escHtml(id)}</option>`)
    ];
    filter.innerHTML = opts.join('');
  }

  const data = selected ? emergenceData.filter(e => e.agentId === selected) : emergenceData;
  if (!data.length) {
    body.innerHTML = '<div style="padding:24px;color:var(--muted);text-align:center">暂无涌现模块数据（Agent 须挂载 AutonomousDriveModule）</div>';
    return;
  }

  body.innerHTML = data.map(e => {
    const col = teamColor(agents.find(a => a.agentId === e.agentId)?.teamId ?? 0);

    // 驱动力条（Disruption 驱动固定红色，其余按强度着色）
    const drivesBars = (e.drives || []).map(d => {
      const pct = Math.round((d.strength || 0) * 100);
      const isDisruption = d.name === 'Disruption';
      const barCol = isDisruption ? 'var(--red)'
                   : pct >= 60 ? 'var(--red)' : pct >= 35 ? 'var(--orange)' : 'var(--green)';
      return `<div style="display:flex;align-items:center;gap:6px;margin:2px 0">
        <span style="color:${isDisruption?'var(--red)':'var(--muted)'};font-size:10px;width:90px;flex-shrink:0">${escHtml(d.name)}</span>
        <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${barCol};border-radius:3px;transition:width 0.3s"></div>
        </div>
        <span style="font-size:10px;color:${barCol};width:32px;text-align:right">${pct}%</span>
      </div>`;
    }).join('');

    // 候选接受者
    const acceptors = (e.pendingAcceptors || []).map(a =>
      `<span style="display:inline-flex;gap:4px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:10px;margin:1px 2px">
        <span style="color:var(--blue)">${escHtml(a.agentId)}</span>
        <span style="color:var(--muted)">${Math.round((a.battery||0)*100)}%</span>
        <span style="color:var(--text)">${escHtml(a.location||'')}</span>
      </span>`
    ).join('');

    // 状态徽章
    const adversarialBadge = e.isAdversarial
      ? `<span style="background:#f8514920;color:var(--red);border:1px solid var(--red);border-radius:4px;padding:1px 6px;font-size:9px">破坏型</span>`
      : '';
    const evalBadge = e.isEvaluating && !e.inCollabSetup
      ? `<span style="background:#3fb95020;color:var(--green);border:1px solid var(--green);border-radius:4px;padding:1px 6px;font-size:9px">LLM评估中</span>`
      : '';
    const collabSetupBadge = e.inCollabSetup
      ? `<span style="background:#58a6ff20;color:var(--blue);border:1px solid var(--blue);border-radius:4px;padding:1px 6px;font-size:9px">协作评估中</span>`
      : '';
    const soloBadge = e.isRunningSolo && !e.inCollabSetup
      ? `<span style="background:#d2992220;color:var(--orange);border:1px solid var(--orange);border-radius:4px;padding:1px 6px;font-size:9px">Solo执行中</span>`
      : '';
    const collectBadge = e.collectingAcceptors
      ? `<span style="background:#d2992220;color:var(--orange);border:1px solid var(--orange);border-radius:4px;padding:1px 6px;font-size:9px">收集接受者…</span>`
      : '';

    // 倒计时
    const countdown = e.secsUntilNextEval < 0
      ? '<span style="color:var(--muted)">非 Idle（不计时）</span>'
      : `<span style="color:var(--blue)">${e.secsUntilNextEval.toFixed(0)}s</span> 后评估`;

    // 任务路径标签
    const pathLabel = e.isRunningSolo
      ? `<span style="font-size:9px;color:var(--orange)">自主涌现路径</span>`
      : `<span style="font-size:9px;color:var(--muted)">外部任务路径</span>`;

    return `<div style="background:var(--card);border:1px solid var(--border);border-left:3px solid ${e.isAdversarial?'var(--red)':col};border-radius:6px;padding:8px 10px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span style="font-weight:bold;font-size:12px;color:${e.isAdversarial?'var(--red)':col}">${escHtml(e.agentId)}</span>
        ${adversarialBadge}${evalBadge}${collabSetupBadge}${soloBadge}${collectBadge}
        <span style="margin-left:auto;font-size:10px;color:var(--muted)">${countdown}</span>
      </div>

      <div style="font-size:10px;color:var(--muted);margin-bottom:4px">驱动力</div>
      ${drivesBars || '<span style="font-size:10px;color:var(--muted)">（尚未计算）</span>'}

      ${e.lastGoal ? `
      <div style="margin-top:6px;padding:5px 7px;background:rgba(88,166,255,0.06);border:1px solid rgba(88,166,255,0.15);border-radius:4px">
        <div style="font-size:9px;color:var(--blue);margin-bottom:3px">最近涌现目标 · ${pathLabel}</div>
        <div style="font-size:11px;color:var(--text)">${escHtml(e.lastGoal)}</div>
        ${e.lastThought ? `<div style="font-size:10px;color:var(--muted);margin-top:3px;font-style:italic">${escHtml(e.lastThought)}</div>` : ''}
      </div>` : ''}

      ${(e.lastSteps && e.lastSteps.length > 0) ? `
      <div style="margin-top:6px;padding:5px 7px;background:rgba(63,185,80,0.06);border:1px solid rgba(63,185,80,0.15);border-radius:4px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="font-size:9px;color:var(--green)">涌现步骤</span>
          ${e.currentStepIndex >= 0 ? `<span style="font-size:9px;color:var(--muted)">${e.currentStepIndex + 1}/${e.totalStepCount}</span>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:2px">
          ${e.lastSteps.map((step, i) => {
            const isCurrent = (i === e.currentStepIndex);
            const isDone    = (e.currentStepIndex >= 0 && i < e.currentStepIndex);
            const icon      = isDone ? '✓' : isCurrent ? '▶' : '○';
            const color     = isDone ? 'var(--muted)' : isCurrent ? 'var(--green)' : 'var(--text)';
            const deco      = isDone ? 'line-through' : 'none';
            return `<div style="display:flex;align-items:flex-start;gap:5px;font-size:10px">
              <span style="color:${color};flex-shrink:0;width:12px;text-align:center">${icon}</span>
              <span style="color:${color};text-decoration:${deco}">${escHtml(step)}</span>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}

      ${(e.collectingAcceptors || e.inCollabSetup) && (e.pendingAcceptors||[]).length > 0 ? `
      <div style="margin-top:6px">
        <div style="font-size:9px;color:var(--orange);margin-bottom:3px">协作候选（${(e.pendingAcceptors||[]).length}）</div>
        <div>${acceptors}</div>
      </div>` : ''}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
