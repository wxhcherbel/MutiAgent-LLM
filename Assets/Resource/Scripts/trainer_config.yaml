behaviors:
  Agent: 
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-5
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 10
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 4
      vis_encode_type: nature_cnn
      memory: null
      use_lstm: false
      sequence_length: 32
      gradient_clip: 0.1
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1  
      curiosity:
        strength: 0.05
        gamma: 0.99
        encoding_size: 128
        learning_rate: 5.0e-5
    keep_checkpoints: 5
    max_steps: 1e6
    time_horizon: 128
    summary_freq: 10000